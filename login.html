<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>司机登录 | Aulala</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #f4f7f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 90%; max-width: 400px; }
        .tabs { display: flex; margin-bottom: 25px; border-bottom: 2px solid #eee; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; color: #888; font-weight: bold; }
        .tab.active { color: #002b7f; border-bottom: 2px solid #002b7f; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; outline: none; box-sizing: border-box; }
        .btn-main { width: 100%; background: #002b7f; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .status-banner { display: none; margin-bottom: 16px; padding: 12px 14px; border-radius: 12px; border: 1px solid rgba(0, 43, 127, 0.12); background: rgba(0, 43, 127, 0.06); color: #002b7f; font-size: 13px; line-height: 1.6; font-weight: 700; }
        .status-banner.visible { display: block; }
        .status-banner.error { color: #c83e33; background: #fff2f2; border-color: rgba(200, 62, 51, 0.15); }
        .status-banner.success { color: #127245; background: #edf9f1; border-color: rgba(18, 114, 69, 0.18); }
        .footer-link { text-align: center; margin-top: 15px; font-size: 13px; color: #666; }
        .footer-link a { color: #002b7f; text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="tabs">
            <div class="tab active" id="loginTab" onclick="switchTab('login')">登录</div>
            <div class="tab" id="regTab" onclick="switchTab('reg')">注册账号</div>
        </div>

        <div id="statusBanner" class="status-banner"></div>

        <div id="loginForm">
            <input type="text" id="phone" placeholder="请输入手机号">
            <input type="password" id="pw" placeholder="请输入密码">
            <button class="btn-main" type="button" onclick="doLogin()">立即登录</button>
        </div>

        <div id="regForm" style="display: none;">
            <input type="text" id="reg-phone" placeholder="手机号">
            <input type="text" id="reg-name" placeholder="姓名">
            <input type="text" id="reg-vehicle" placeholder="车型 (如：丰田 HiAce)">
            <input type="password" id="reg-pass" placeholder="设置密码">
            <button class="btn-main" type="button" onclick="doRegister()">提交注册</button>
        </div>
        
        <div class="footer-link">
            登录即代表同意《Aulala 司机服务协议》 · <a href="admin.html">管理后台</a>
        </div>
    </div>

    <script>
        const TEST_DRIVER_ACCOUNT = "13888888888";
        const TEST_DRIVER_PASSWORD = "123456";
        const KEVIN_DRIVER_ACCOUNT = "0450440830";
        const KEVIN_DRIVER_PASSWORD = "Aulala123";
        const APP_STORAGE_KEY = "aulala_app_runtime_v1";
        const ADMIN_STORAGE_KEY = "aulala_admin_runtime_v1";
        const DRIVER_ACCOUNTS_KEY = "aulala_driver_accounts_v1";
        const DEFAULT_DRIVER_PAYOUT_RATIO = 0.78;
        const DRIVER_API_BASES = ["https://api.ai-express.cn:8443", "https://api.ai-express.cn"];
        const statusBanner = document.getElementById("statusBanner");

        function safeParse(raw, fallback) {
            try {
                return JSON.parse(raw || "");
            } catch (error) {
                return fallback;
            }
        }

        function nowStamp() {
            const date = new Date();
            const pad = value => String(value).padStart(2, "0");
            return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
        }

        function normalizePhone(value) {
            return String(value || "").replace(/\s+/g, "");
        }

        function extractBankTail(value) {
            const digits = String(value || "").replace(/\D+/g, "");
            if (digits.length >= 4) {
                return digits.slice(-4);
            }
            const compact = String(value || "").replace(/\s+/g, "").trim();
            return compact ? compact.slice(-4) : "";
        }

        function normalizeDriverRecord(driver = {}) {
            const bankAccount = String(driver.bankAccount || "").trim();
            return {
                id: String(driver.id || "").trim(),
                phone: normalizePhone(driver.phone || driver.account || ""),
                name: String(driver.name || "").trim(),
                vehicleType: String(driver.vehicleType || "").trim(),
                plate: String(driver.plate || "").trim(),
                city: String(driver.city || "").trim() || "Sydney",
                settlementCycle: String(driver.settlementCycle || "").trim() || "周结",
                bankName: String(driver.bankName || "").trim(),
                bankAccountName: String(driver.bankAccountName || "").trim(),
                bankAccount,
                bankTail: String(driver.bankTail || "").trim() || extractBankTail(bankAccount),
                createdAt: String(driver.createdAt || "").trim(),
                updatedAt: String(driver.updatedAt || "").trim(),
                status: String(driver.status || "active").trim() || "active",
                notes: String(driver.notes || "").trim(),
                passwordHash: String(driver.passwordHash || "").trim()
            };
        }

        function showStatus(message, type = "error") {
            statusBanner.textContent = message;
            statusBanner.className = `status-banner visible ${type === "success" ? "success" : "error"}`;
        }

        function clearStatus() {
            statusBanner.textContent = "";
            statusBanner.className = "status-banner";
        }

        async function sha256(text) {
            if (!window.crypto || !window.crypto.subtle) {
                return `plain:${text}`;
            }
            try {
                const bytes = new TextEncoder().encode(text);
                const digest = await crypto.subtle.digest("SHA-256", bytes);
                return Array.from(new Uint8Array(digest)).map(byte => byte.toString(16).padStart(2, "0")).join("");
            } catch (error) {
                return `plain:${text}`;
            }
        }

        function loadRegisteredDrivers() {
            const drivers = safeParse(localStorage.getItem(DRIVER_ACCOUNTS_KEY), []);
            return Array.isArray(drivers) ? drivers.map(normalizeDriverRecord).filter(driver => driver.phone) : [];
        }

        function saveRegisteredDrivers(drivers) {
            localStorage.setItem(DRIVER_ACCOUNTS_KEY, JSON.stringify(drivers));
        }

        async function requestDriverApi(path, options = {}) {
            let lastError = null;
            for (const base of DRIVER_API_BASES) {
                try {
                    const response = await fetch(`${base}${path}`, {
                        method: options.method || "GET",
                        headers: {
                            "Content-Type": "application/json",
                            ...(options.headers || {})
                        },
                        body: options.body ? JSON.stringify(options.body) : undefined
                    });
                    const payload = await response.json().catch(() => ({}));
                    if (!response.ok || payload?.ok === false) {
                        const error = new Error(payload?.error?.message || `request failed: ${response.status}`);
                        error.code = payload?.error?.code || `HTTP_${response.status}`;
                        throw error;
                    }
                    return payload;
                } catch (error) {
                    lastError = error;
                }
            }
            throw lastError || new Error("driver api unavailable");
        }

        function seedAdminDrivers() {
            return [
                {
                    id: "DRV-001",
                    name: "测试司机",
                    phone: TEST_DRIVER_ACCOUNT,
                    vehicleType: "Van",
                    plate: "TEST-888",
                    city: "Sydney",
                    status: "active",
                    settlementCycle: "周结",
                    bankTail: "6688",
                    payoutRatio: DEFAULT_DRIVER_PAYOUT_RATIO,
                    joinedAt: nowStamp().slice(0, 10),
                    notes: "系统预置测试司机，可直接用于当前测试单登录与后台分配。"
                },
                {
                    id: "DRV-002",
                    name: "备用司机",
                    phone: "13900000001",
                    vehicleType: "Truck",
                    plate: "AUL-201",
                    city: "Melbourne",
                    status: "inactive",
                    settlementCycle: "月结",
                    bankTail: "5218",
                    payoutRatio: 0.8,
                    joinedAt: nowStamp().slice(0, 10),
                    notes: "备用运力，可在需要时启用。"
                },
                {
                    id: "DRV-003",
                    name: "kevin",
                    phone: "0450440830",
                    vehicleType: "Isuzu",
                    plate: "",
                    city: "Sydney",
                    status: "active",
                    settlementCycle: "周结",
                    bankTail: "",
                    payoutRatio: DEFAULT_DRIVER_PAYOUT_RATIO,
                    joinedAt: nowStamp().slice(0, 10),
                    notes: "预置司机，用于后台固定指派单。"
                }
            ];
        }

        function syncDriverToAdmin(driverAccount) {
            const normalized = normalizeDriverRecord(driverAccount);
            const saved = safeParse(localStorage.getItem(ADMIN_STORAGE_KEY), {});
            const drivers = Array.isArray(saved.drivers) && saved.drivers.length ? saved.drivers.slice() : seedAdminDrivers();
            const existingIndex = drivers.findIndex(driver => normalizePhone(driver.phone) === normalized.phone);
            const existing = existingIndex >= 0 ? drivers[existingIndex] : null;
            const nextDriver = {
                id: existing?.id || `DRV-${String(drivers.length + 1).padStart(3, "0")}`,
                name: normalized.name || existing?.name || "新注册司机",
                phone: normalized.phone,
                vehicleType: normalized.vehicleType || existing?.vehicleType || "Van",
                plate: normalized.plate || existing?.plate || "",
                city: normalized.city || existing?.city || "Sydney",
                status: "active",
                settlementCycle: normalized.settlementCycle || existing?.settlementCycle || "周结",
                bankTail: normalized.bankTail || existing?.bankTail || "",
                payoutRatio: Number(existing?.payoutRatio || DEFAULT_DRIVER_PAYOUT_RATIO),
                joinedAt: existing?.joinedAt || normalized.createdAt?.slice(0, 10) || nowStamp().slice(0, 10),
                notes: normalized.notes || existing?.notes || "司机在登录页自助注册。"
            };
            if (existingIndex >= 0) {
                drivers.splice(existingIndex, 1, nextDriver);
            } else {
                drivers.unshift(nextDriver);
            }
            saved.drivers = drivers;
            saved.updatedAt = nowStamp();
            localStorage.setItem(ADMIN_STORAGE_KEY, JSON.stringify(saved));
        }

        function switchTab(type) {
            const isLogin = type === 'login';
            clearStatus();
            document.getElementById('loginForm').style.display = isLogin ? 'block' : 'none';
            document.getElementById('regForm').style.display = isLogin ? 'none' : 'block';
            document.getElementById('loginTab').className = isLogin ? 'tab active' : 'tab';
            document.getElementById('regTab').className = isLogin ? 'tab' : 'tab active';
        }

        function bootstrapDriverSession(account, profile = {}) {
            const normalized = normalizeDriverRecord({ ...profile, phone: account });
            let currentState = {};
            try {
                currentState = JSON.parse(localStorage.getItem(APP_STORAGE_KEY) || "{}") || {};
            } catch (error) {
                currentState = {};
            }

            localStorage.setItem(
                APP_STORAGE_KEY,
                JSON.stringify({
                    ...currentState,
                    loggedIn: true,
                    userRole: "driver",
                    authMode: "login",
                    driverProfile: {
                        id: normalized.id,
                        account: normalized.phone,
                        name: normalized.name,
                        vehicleType: normalized.vehicleType,
                        plate: normalized.plate,
                        city: normalized.city,
                        settlementCycle: normalized.settlementCycle,
                        bankName: normalized.bankName,
                        bankAccountName: normalized.bankAccountName,
                        bankAccount: normalized.bankAccount,
                        bankTail: normalized.bankTail,
                        createdAt: normalized.createdAt,
                        updatedAt: normalized.updatedAt,
                        status: normalized.status,
                        notes: normalized.notes
                    }
                })
            );

            localStorage.setItem("aulala-login-session", JSON.stringify({
                account: normalized.phone,
                role: "driver",
                loggedAt: new Date().toISOString(),
                name: normalized.name,
                vehicleType: normalized.vehicleType,
                plate: normalized.plate,
                city: normalized.city,
                settlementCycle: normalized.settlementCycle,
                bankName: normalized.bankName,
                bankAccountName: normalized.bankAccountName,
                bankAccount: normalized.bankAccount,
                bankTail: normalized.bankTail,
                createdAt: normalized.createdAt,
                updatedAt: normalized.updatedAt,
                status: normalized.status,
                notes: normalized.notes
            }));
        }

        async function doLogin() {
            try {
                const phone = normalizePhone(document.getElementById('phone').value.trim());
                const password = document.getElementById('pw').value.trim();
                clearStatus();
                if (!phone || !password) {
                    showStatus("请输入手机号和密码。");
                    return;
                }
                if (phone === TEST_DRIVER_ACCOUNT && password === TEST_DRIVER_PASSWORD) {
                    bootstrapDriverSession(phone, { name: "测试司机", vehicleType: "Van" });
                    window.location.href = "app.html?view=profile";
                    return;
                }
                if (phone === KEVIN_DRIVER_ACCOUNT && password === KEVIN_DRIVER_PASSWORD) {
                    const kevinProfile = {
                        id: "DRV-001",
                        name: "kevin",
                        vehicleType: "Isuzu",
                        plate: "",
                        city: "Sydney",
                        settlementCycle: "周结",
                        bankName: "",
                        bankAccountName: "",
                        bankAccount: "",
                        bankTail: "",
                        createdAt: "2026-03-31T10:00:32.804Z",
                        updatedAt: new Date().toISOString(),
                        status: "active",
                        notes: ""
                    };
                    const drivers = loadRegisteredDrivers();
                    const existingIndex = drivers.findIndex(item => normalizePhone(item.phone) === phone);
                    const nextLocalDriver = normalizeDriverRecord({
                        ...kevinProfile,
                        phone,
                        passwordHash: await sha256(password)
                    });
                    if (existingIndex >= 0) {
                        drivers.splice(existingIndex, 1, nextLocalDriver);
                    } else {
                        drivers.unshift(nextLocalDriver);
                    }
                    saveRegisteredDrivers(drivers);
                    syncDriverToAdmin(nextLocalDriver);
                    bootstrapDriverSession(phone, nextLocalDriver);
                    window.location.href = "app.html?view=profile";
                    return;
                }

                try {
                    const remote = await requestDriverApi("/api/aulala/driver-login", {
                        method: "POST",
                        body: { phone, password }
                    });
                    const driver = normalizeDriverRecord(remote.driver || {});
                    const drivers = loadRegisteredDrivers();
                    const existingIndex = drivers.findIndex(item => normalizePhone(item.phone) === phone);
                    const nextLocalDriver = normalizeDriverRecord({
                        ...(existingIndex >= 0 ? drivers[existingIndex] : {}),
                        ...driver,
                        phone,
                        passwordHash: await sha256(password),
                        createdAt: driver.createdAt || drivers[existingIndex]?.createdAt || nowStamp()
                    });
                    if (existingIndex >= 0) {
                        drivers.splice(existingIndex, 1, nextLocalDriver);
                    } else {
                        drivers.unshift(nextLocalDriver);
                    }
                    saveRegisteredDrivers(drivers);
                    syncDriverToAdmin(nextLocalDriver);
                    bootstrapDriverSession(phone, driver);
                    window.location.href = "app.html?view=profile";
                    return;
                } catch (error) {
                    if (!["DRIVER_NOT_FOUND", "INVALID_DRIVER_PASSWORD", "HTTP_404", "HTTP_401"].includes(error.code || "")) {
                        console.warn("remote driver login failed, fallback to local", error);
                    }
                }

                const drivers = loadRegisteredDrivers();
                const account = drivers.find(item => normalizePhone(item.phone) === phone);
                if (!account) {
                    showStatus("账号不存在，请先注册司机账号。");
                    return;
                }
                const passwordHash = await sha256(password);
                if (passwordHash !== account.passwordHash) {
                    showStatus("密码不正确，请重新输入。");
                    return;
                }
                bootstrapDriverSession(phone, account);
                window.location.href = "app.html?view=profile";
            } catch (error) {
                console.error("driver login failed", error);
                showStatus("登录失败，请刷新页面后重试。");
            }
        }

        async function doRegister() {
            try {
                const phone = normalizePhone(document.getElementById("reg-phone").value.trim());
                const name = document.getElementById("reg-name").value.trim();
                const vehicleType = document.getElementById("reg-vehicle").value.trim();
                const password = document.getElementById("reg-pass").value.trim();
                clearStatus();

                if (!phone || !name || !vehicleType || !password) {
                    showStatus("请完整填写手机号、姓名、车型和密码。");
                    return;
                }
                if (phone.length < 6) {
                    showStatus("手机号格式不正确，请重新输入。");
                    return;
                }
                if (normalizePhone(phone) === TEST_DRIVER_ACCOUNT) {
                    showStatus("这个手机号已被系统测试司机占用，请换一个手机号注册。");
                    return;
                }
                if (password.length < 6) {
                    showStatus("密码至少需要 6 位。");
                    return;
                }

                const drivers = loadRegisteredDrivers();
                const duplicate = drivers.find(item => normalizePhone(item.phone) === phone);
                if (duplicate) {
                    showStatus("这个手机号已经注册过了，请直接登录。");
                    return;
                }

                const newAccount = {
                    phone,
                    name,
                    vehicleType,
                    plate: "",
                    city: "Sydney",
                    settlementCycle: "周结",
                    bankName: "",
                    bankAccountName: "",
                    bankAccount: "",
                    bankTail: "",
                    notes: "",
                    passwordHash: await sha256(password),
                    createdAt: nowStamp()
                };
                try {
                    const remote = await requestDriverApi("/api/aulala/driver-register", {
                        method: "POST",
                        body: { phone, name, vehicleType, password }
                    });
                    if (remote?.driver) {
                        Object.assign(newAccount, normalizeDriverRecord({
                            ...newAccount,
                            ...remote.driver,
                            passwordHash: newAccount.passwordHash,
                            createdAt: remote.driver.createdAt || newAccount.createdAt
                        }));
                    }
                } catch (error) {
                    if (error.code === "DUPLICATE_DRIVER" || error.code === "HTTP_409") {
                        showStatus("这个手机号已经注册过了，请直接登录。");
                        return;
                    }
                    console.warn("remote driver register failed, fallback to local", error);
                }

                drivers.unshift(newAccount);
                saveRegisteredDrivers(drivers);
                syncDriverToAdmin(newAccount);
                showStatus("注册成功，正在进入司机后台。", "success");
                bootstrapDriverSession(phone, newAccount);
                setTimeout(() => {
                    window.location.href = "app.html?view=profile";
                }, 250);
            } catch (error) {
                console.error("driver register failed", error);
                showStatus("注册失败，请刷新页面后再试。");
            }
        }

        const urlParams = new URLSearchParams(window.location.search);
        const initialMode = urlParams.get('mode') === 'reg' || window.location.hash === '#reg' ? 'reg' : 'login';
        switchTab(initialMode);
    </script>
</body>
</html>
