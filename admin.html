<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aulala 管理后台</title>
    <style>
        :root {
            --bg: #f3f6fb;
            --panel: #ffffff;
            --primary: #0b3b91;
            --primary-strong: #07275f;
            --primary-soft: #eaf1ff;
            --accent: #f08c00;
            --success: #1f9d55;
            --warning: #c27c0e;
            --danger: #d9485f;
            --muted: #667085;
            --text: #17213a;
            --border: #d9e2f0;
            --shadow: 0 22px 50px rgba(15, 23, 42, 0.08);
            --radius: 22px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(240, 140, 0, 0.12), transparent 24%),
                radial-gradient(circle at bottom right, rgba(11, 59, 145, 0.14), transparent 26%),
                linear-gradient(180deg, #f9fbff 0%, var(--bg) 100%);
            color: var(--text);
            min-height: 100vh;
        }

        button,
        input,
        select,
        textarea {
            font: inherit;
        }

        .hidden {
            display: none !important;
        }

        .login-shell {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 28px;
        }

        .login-card {
            width: min(460px, 100%);
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(11, 59, 145, 0.12);
            border-radius: 28px;
            padding: 34px 30px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
        }

        .brand-title {
            font-size: 30px;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .brand-copy {
            color: var(--muted);
            line-height: 1.8;
            margin: 0 0 22px;
        }

        .login-note {
            margin-bottom: 18px;
            padding: 14px 16px;
            border-radius: 16px;
            background: rgba(11, 59, 145, 0.06);
            color: var(--primary);
            border: 1px solid rgba(11, 59, 145, 0.12);
            font-size: 13px;
            line-height: 1.7;
        }

        .stack {
            display: grid;
            gap: 14px;
        }

        .field-label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .field,
        .select,
        .textarea {
            width: 100%;
            border: 1px solid var(--border);
            background: #fff;
            border-radius: 16px;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .field,
        .select {
            height: 50px;
            padding: 0 14px;
        }

        .textarea {
            min-height: 120px;
            padding: 14px;
            resize: vertical;
        }

        .field:focus,
        .select:focus,
        .textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(11, 59, 145, 0.08);
        }

        .btn {
            border: none;
            border-radius: 16px;
            padding: 14px 18px;
            cursor: pointer;
            font-weight: 800;
            transition: transform 0.16s ease, box-shadow 0.16s ease, opacity 0.16s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn:disabled {
            cursor: not-allowed;
            opacity: 0.6;
            transform: none;
        }

        .btn-primary {
            color: #fff;
            background: linear-gradient(135deg, var(--primary) 0%, #125cdb 100%);
            box-shadow: 0 16px 30px rgba(11, 59, 145, 0.18);
        }

        .btn-secondary {
            color: var(--primary);
            background: var(--primary-soft);
            border: 1px solid #c9dafc;
        }

        .btn-danger {
            color: #fff;
            background: linear-gradient(135deg, #d9485f 0%, #f0657c 100%);
        }

        .status-banner {
            display: none;
            margin-top: 16px;
            padding: 13px 15px;
            border-radius: 14px;
            background: #fff4f4;
            color: var(--danger);
            border: 1px solid rgba(217, 72, 95, 0.18);
            font-size: 14px;
            font-weight: 700;
        }

        .status-banner.visible {
            display: block;
        }

        .app-shell {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            padding: 24px 18px;
            background: linear-gradient(180deg, #08285f 0%, #0b3b91 100%);
            color: #fff;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .sidebar-brand {
            margin-bottom: 26px;
        }

        .sidebar-brand strong {
            display: block;
            font-size: 24px;
            font-weight: 900;
        }

        .sidebar-brand span {
            display: block;
            margin-top: 8px;
            color: rgba(255, 255, 255, 0.76);
            font-size: 13px;
            line-height: 1.7;
        }

        .nav-list {
            display: grid;
            gap: 10px;
        }

        .nav-item {
            width: 100%;
            text-align: left;
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 13px 14px;
            cursor: pointer;
            font-weight: 800;
        }

        .nav-item.active {
            background: #fff;
            color: var(--primary);
            box-shadow: 0 16px 30px rgba(6, 16, 38, 0.18);
        }

        .sidebar-footer {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.16);
            font-size: 13px;
            color: rgba(255, 255, 255, 0.72);
            line-height: 1.7;
        }

        .main {
            flex: 1;
            padding: 26px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 20px;
        }

        .topbar h1 {
            margin: 0;
            font-size: 30px;
            font-weight: 900;
        }

        .topbar p {
            margin: 8px 0 0;
            color: var(--muted);
            line-height: 1.7;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid rgba(15, 23, 42, 0.06);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
        }

        .panel + .panel {
            margin-top: 18px;
        }

        .panel-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }

        .panel-title {
            font-size: 20px;
            font-weight: 900;
            color: var(--primary-strong);
        }

        .panel-subtitle {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.7;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 14px;
        }

        .summary-card {
            background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
            border: 1px solid #e3ebf6;
            border-radius: 20px;
            padding: 18px;
        }

        .summary-label {
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .summary-value {
            margin-top: 12px;
            font-size: 28px;
            font-weight: 900;
            color: var(--primary);
        }

        .summary-hint {
            margin-top: 10px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.7;
        }

        .quick-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 18px;
        }

        .list-stack {
            display: grid;
            gap: 12px;
        }

        .mini-card {
            border: 1px solid #e5edf7;
            border-radius: 18px;
            padding: 14px 16px;
            background: #fff;
        }

        .mini-card strong {
            display: block;
            font-size: 16px;
            font-weight: 900;
            color: var(--primary-strong);
            margin-bottom: 8px;
        }

        .mini-card p {
            margin: 4px 0;
            font-size: 13px;
            color: #455468;
            line-height: 1.6;
        }

        .request-queue {
            margin-bottom: 18px;
            padding: 18px;
            border: 1px solid #f3d3da;
            background: linear-gradient(180deg, #fff8f9 0%, #ffffff 100%);
            border-radius: 20px;
        }

        .request-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
            margin-top: 14px;
        }

        .request-card {
            border: 1px solid #f0d7dd;
            border-radius: 18px;
            padding: 16px;
            background: #fff;
        }

        .request-card-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 10px;
        }

        .request-card-price {
            font-size: 24px;
            font-weight: 900;
            color: var(--danger);
            white-space: nowrap;
        }

        .request-card-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 14px;
        }

        .tag-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 800;
            background: #eef4ff;
            color: var(--primary);
        }

        .tag.success {
            background: #edf8f2;
            color: var(--success);
        }

        .tag.warning {
            background: #fff7e8;
            color: var(--warning);
        }

        .tag.danger {
            background: #fff1f3;
            color: var(--danger);
        }

        .filters {
            display: grid;
            grid-template-columns: 1.2fr repeat(3, minmax(0, 180px));
            gap: 12px;
            margin-bottom: 16px;
        }

        .table-wrap {
            overflow: auto;
            border: 1px solid #e3ebf6;
            border-radius: 18px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1080px;
            background: #fff;
        }

        th,
        td {
            padding: 14px 14px;
            border-bottom: 1px solid #edf2f7;
            vertical-align: top;
            text-align: left;
            font-size: 13px;
        }

        th {
            background: #f8fbff;
            color: var(--muted);
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            position: sticky;
            top: 0;
            z-index: 1;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .cell-title {
            font-size: 14px;
            font-weight: 900;
            color: var(--primary-strong);
        }

        .cell-sub {
            margin-top: 6px;
            color: var(--muted);
            line-height: 1.6;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 900;
            white-space: nowrap;
        }

        .pill.blue {
            background: #eef4ff;
            color: var(--primary);
        }

        .pill.green {
            background: #edf8f2;
            color: var(--success);
        }

        .pill.orange {
            background: #fff7e8;
            color: var(--warning);
        }

        .pill.red {
            background: #fff1f3;
            color: var(--danger);
        }

        .inline-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .inline-select {
            min-width: 148px;
            height: 38px;
            border-radius: 12px;
            border: 1px solid #d6e0ef;
            padding: 0 10px;
            background: #fff;
        }

        .inline-btn {
            border: 1px solid #cfe0ff;
            background: #eef4ff;
            color: var(--primary);
            border-radius: 12px;
            padding: 9px 12px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 800;
        }

        .driver-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
        }

        .driver-card {
            border: 1px solid #e4ecf7;
            border-radius: 20px;
            padding: 18px;
            background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
        }

        .driver-card-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 14px;
        }

        .driver-name {
            font-size: 18px;
            font-weight: 900;
            color: var(--primary-strong);
        }

        .driver-meta {
            margin-top: 4px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.7;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            margin: 14px 0;
        }

        .detail-box {
            border-radius: 16px;
            padding: 12px;
            background: #f8fbff;
            border: 1px solid #e4ecf7;
        }

        .detail-box span {
            display: block;
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .detail-box strong {
            display: block;
            margin-top: 8px;
            color: var(--primary-strong);
            font-size: 16px;
            font-weight: 900;
        }

        .driver-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .empty-state {
            padding: 28px 22px;
            text-align: center;
            color: var(--muted);
            line-height: 1.8;
            border: 1px dashed #d3dfef;
            border-radius: 20px;
            background: #fbfdff;
        }

        .modal-shell {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            display: grid;
            place-items: center;
            padding: 20px;
            z-index: 1000;
        }

        .modal-card {
            width: min(760px, 100%);
            max-height: calc(100vh - 40px);
            overflow: auto;
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(15, 23, 42, 0.24);
            padding: 24px;
        }

        .modal-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }

        .modal-head h3 {
            margin: 0;
            font-size: 22px;
            font-weight: 900;
            color: var(--primary-strong);
        }

        .modal-close {
            border: none;
            background: #eef4ff;
            color: var(--primary);
            width: 38px;
            height: 38px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 900;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .full-span {
            grid-column: 1 / -1;
        }

        .modal-actions {
            margin-top: 20px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .finance-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 14px;
            margin-bottom: 16px;
        }

        .finance-card {
            padding: 18px;
            border-radius: 20px;
            border: 1px solid #e4ecf7;
            background: linear-gradient(180deg, #ffffff 0%, #f9fbff 100%);
        }

        .finance-card strong {
            display: block;
            font-size: 28px;
            font-weight: 900;
            color: var(--primary);
            margin-top: 10px;
        }

        .muted-link {
            color: var(--muted);
            font-size: 13px;
            text-decoration: none;
        }

        @media (max-width: 1180px) {
            .summary-grid,
            .finance-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .quick-grid,
            .driver-grid,
            .request-grid {
                grid-template-columns: 1fr;
            }

            .filters {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 900px) {
            .app-shell {
                display: block;
            }

            .sidebar {
                width: auto;
                height: auto;
                position: static;
                padding-bottom: 18px;
            }

            .main {
                padding: 18px;
            }

            .topbar,
            .panel-title-row {
                flex-direction: column;
                align-items: flex-start;
            }

            .form-grid,
            .detail-grid,
            .filters,
            .summary-grid,
            .finance-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="admin-login-view" class="login-shell">
        <div class="login-card">
            <div class="brand-title">Aulala 管理后台</div>
            <p class="brand-copy">集中处理司机管理、订单调度和财务结算。当前版本优先保证简洁、快速、能直接上线使用。</p>
            <div class="login-note">安全说明：当前后台是静态站点上的受控入口，数据持久化在浏览器本地。适合先快速跑起来；后续如果你要，我可以继续接成真实服务端后台。</div>
            <form id="admin-login-form" class="stack">
                <div>
                    <label class="field-label" for="admin-account">管理员账号</label>
                    <input id="admin-account" class="field" type="text" autocomplete="username" placeholder="请输入管理员账号">
                </div>
                <div>
                    <label class="field-label" for="admin-password">管理员密码</label>
                    <input id="admin-password" class="field" type="password" autocomplete="current-password" placeholder="请输入管理员密码">
                </div>
                <button class="btn btn-primary" type="submit">进入后台</button>
            </form>
            <div id="admin-login-status" class="status-banner"></div>
        </div>
    </div>

    <div id="admin-shell" class="app-shell hidden">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <strong>Aulala Admin</strong>
                <span>司机管理、订单管理、财务管理三块合一，直接围绕当前抢单大厅数据工作。</span>
            </div>
            <div class="nav-list">
                <button class="nav-item active" data-panel="overview">运营总览</button>
                <button class="nav-item" data-panel="drivers">司机管理</button>
                <button class="nav-item" data-panel="orders">订单管理</button>
                <button class="nav-item" data-panel="finance">财务管理</button>
            </div>
            <div class="sidebar-footer">
                <div>初始口径</div>
                <div>订单源：ERP 自动单 + 货主发布单</div>
                <div>状态：直接读取线上 feed 与当前浏览器 runtime</div>
            </div>
        </aside>

        <main class="main">
            <div class="topbar">
                <div>
                    <h1>后台管理系统</h1>
                    <p id="topbar-copy">载入当前订单、司机和财务状态中。</p>
                </div>
                <div class="toolbar">
                    <button class="btn btn-secondary" id="refresh-admin-btn" type="button">刷新数据</button>
                    <button class="btn btn-secondary" id="export-finance-btn" type="button">导出财务 CSV</button>
                    <button class="btn btn-danger" id="logout-admin-btn" type="button">退出后台</button>
                </div>
            </div>

            <section id="panel-overview" class="panel"></section>
            <section id="panel-drivers" class="panel hidden"></section>
            <section id="panel-orders" class="panel hidden"></section>
            <section id="panel-finance" class="panel hidden"></section>
        </main>
    </div>

    <div id="modal-shell" class="modal-shell hidden">
        <div class="modal-card">
            <div class="modal-head">
                <h3 id="modal-title">详情</h3>
                <button class="modal-close" id="modal-close-btn" type="button">×</button>
            </div>
            <div id="modal-body"></div>
        </div>
    </div>

        const state = {

            }

        const LIVE_ADMIN_REFRESH_INTERVAL_MS = 5000;

        function safeParse(raw, fallback) {
            try {
                return JSON.parse(raw || "");
            } catch (error) {
                return fallback;
            }
        }

        function nowStamp() {
            const date = new Date();
            const pad = value => String(value).padStart(2, "0");
            return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
        }

        function normalizePhone(value) {
            return String(value || "").replace(/\s+/g, "");
        }

        function roundMoney(value) {
            const numeric = Number(value || 0);
            return Number.isFinite(numeric) ? Number(numeric.toFixed(2)) : 0;
        }

        function formatCurrency(value) {
            return `$${roundMoney(value).toFixed(2)}`;
        }

        function escapeHtml(value) {
            return String(value || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function shortText(value, maxLength = 48) {
            const text = String(value || "");
            return text.length > maxLength ? `${text.slice(0, maxLength)}...` : text;
        }

        function formatRatio(value) {
            const numeric = Number(value || 0);
            return `${Math.round(numeric * 100)}%`;
        }

        function orderKey(order) {
            return order.orderCode ? `code:${order.orderCode}` : `id:${order.id}`;

        function encodeKey(key) {
            return encodeURIComponent(key);
        }

        function decodeKey(key) {
            return decodeURIComponent(key);
        }

        function normalizeDrivers(drivers) {
            const source = Array.isArray(drivers) && drivers.length ? drivers : DEFAULT_DRIVERS;
            return source.map((driver, index) => ({
                id: driver.id || `DRV-${String(index + 1).padStart(3, "0")}`,
                name: driver.name || "未命名司机",
                phone: driver.phone || "",
                vehicleType: driver.vehicleType || "Van",
                plate: driver.plate || "",
                city: driver.city || "Sydney",
                status: driver.status === "inactive" ? "inactive" : "active",

                payoutRatio: Number(driver.payoutRatio || DEFAULT_DRIVER_PAYOUT_RATIO),
                joinedAt: driver.joinedAt || nowStamp().slice(0, 10),
                notes: driver.notes || ""
            }));
        }

        function nextDriverId(drivers) {
            const maxId = drivers.reduce((max, driver) => {
                const match = String(driver.id || "").match(/(\d+)/);
                return match ? Math.max(max, Number(match[1])) : max;
            }, 0);
            return `DRV-${String(maxId + 1).padStart(3, "0")}`;
        }

        function loadRegisteredDriverAccounts() {

        async function fetchRemoteDrivers() {
            let lastError = null;
            for (const base of DRIVER_API_BASES) {
                try {
                    const response = await fetch(`${base}/api/aulala/drivers`, {
                        cache: "no-store"
                    });
                    const payload = await response.json().catch(() => ({}));
                    if (!response.ok || payload?.ok === false) {
                        const error = new Error(payload?.error?.message || `request failed: ${response.status}`);
                        error.code = payload?.error?.code || `HTTP_${response.status}`;
                        throw error;
                    }
                    return Array.isArray(payload?.drivers) ? payload.drivers : [];
                } catch (error) {
                    lastError = error;
                }
            }
            throw lastError || new Error("remote drivers unavailable");
        }

        function normalizeRemoteAdminRuntime(payload = {}) {
            const runtime = payload && typeof payload === "object" ? payload : {};
            const orderOps = {};
            const rawOrderOps = runtime.orderOps && typeof runtime.orderOps === "object" ? runtime.orderOps : {};
            Object.entries(rawOrderOps).forEach(([key, raw]) => {
                const normalizedKey = String(key || "").trim();
                if (!normalizedKey) {
                    return;
                }
                orderOps[normalizedKey] = {
                    ...raw,
                    assignedDriverAccount: normalizePhone(raw.assignedDriverAccount || ""),
                    assignedDriverName: String(raw.assignedDriverName || "").trim(),
                    flowStatus: String(raw.flowStatus || "").trim(),
                    runtimeStatus: String(raw.runtimeStatus || "").trim(),
                    driverAcceptedAt: String(raw.driverAcceptedAt || "").trim(),
                    actualPickupTime: String(raw.actualPickupTime || "").trim(),
                    deliveredAt: String(raw.deliveredAt || "").trim(),
                    signaturePhoto: String(raw.signaturePhoto || "").trim(),
                    podDownloadUrl: String(raw.podDownloadUrl || "").trim(),
                    podFilename: String(raw.podFilename || "").trim(),
                    podGeneratedAt: String(raw.podGeneratedAt || "").trim(),
                    driverRequestedPrice: Number(raw.driverRequestedPrice || 0),
                    agreedDriverPrice: roundMoney(raw.agreedDriverPrice || 0),
                    forceUnassigned: Boolean(raw.forceUnassigned),
                    customerReceivable: roundMoney(raw.customerReceivable || 0),
                    driverPayable: roundMoney(raw.driverPayable || 0),
                    driverQuoteStatus: raw.driverQuoteStatus || (Number(raw.driverRequestedPrice || 0) > 0 ? "pending" : "")
                };
            });
            return {
                drivers: normalizeDrivers(runtime.drivers),
                orderOps,
                updatedAt: runtime.updatedAt || ""
            };
        }

        async function fetchRemoteAdminRuntime() {
            let lastError = null;
            for (const base of DRIVER_API_BASES) {
                try {
                    const response = await fetch(`${base}/api/aulala/admin-runtime`, {
                        cache: "no-store"
                    });
                    const payload = await response.json().catch(() => ({}));
                    if (!response.ok || payload?.ok === false) {
                        const error = new Error(payload?.error?.message || `request failed: ${response.status}`);
                        error.code = payload?.error?.code || `HTTP_${response.status}`;
                        throw error;
                    }
                    return normalizeRemoteAdminRuntime(payload.runtime || {});
                } catch (error) {
                    lastError = error;
                }
            }
            throw lastError || new Error("remote admin runtime unavailable");

        async function pushRemoteAdminRuntime(runtime) {

                        method: "POST",

                            "Content-Type": "application/json"

                    });

                        throw error;
                    }
                    return normalizeRemoteAdminRuntime(payload.runtime || {});
                } catch (error) {

                }

        async function upsertRemoteOrderOp(orderKey, partial) {
            let lastError = null;
            for (const base of DRIVER_API_BASES) {
                try {
                    const response = await fetch(`${base}/api/aulala/order-op/upsert`, {

                        },

                        })

                    if (!response.ok || payload?.ok === false) {
                        const error = new Error(payload?.error?.message || `request failed: ${response.status}`);
                        error.code = payload?.error?.code || `HTTP_${response.status}`;
                        throw error;
                    }
                    return normalizeRemoteAdminRuntime(payload.runtime || {});
                } catch (error) {
                    lastError = error;
                }
            }
            throw lastError || new Error("upsert remote order op failed");
        }

        function mergeRegisteredDrivers(drivers, registeredAccounts) {
            const nextDrivers = Array.isArray(drivers) ? drivers.slice() : [];
            registeredAccounts.forEach(account => {
                const phone = normalizePhone(account.phone);
                if (!phone) {
                    return;
                }
                const existingIndex = nextDrivers.findIndex(driver => normalizePhone(driver.phone) === phone);
                if (existingIndex >= 0) {
                    const existing = nextDrivers[existingIndex];
                    nextDrivers.splice(existingIndex, 1, {
                        ...existing,
                        name: account.name || existing.name,
                        phone,
                        vehicleType: account.vehicleType || existing.vehicleType,
                        plate: account.plate || existing.plate,
                        city: account.city || existing.city,
                        settlementCycle: account.settlementCycle || existing.settlementCycle,
                        bankTail: account.bankTail || existing.bankTail,
                        joinedAt: existing.joinedAt || String(account.createdAt || "").slice(0, 10) || nowStamp().slice(0, 10),
                        notes: existing.notes || "司机在登录页自助注册。"
                    });
                    return;
                }
                nextDrivers.unshift({
                    id: nextDriverId(nextDrivers),
                    name: account.name || "新注册司机",
                    phone,
                    vehicleType: account.vehicleType || "Van",
                    plate: account.plate || "",
                    city: account.city || "Sydney",
                    status: "active",
                    settlementCycle: account.settlementCycle || "周结",
                    bankTail: account.bankTail || "",
                    payoutRatio: DEFAULT_DRIVER_PAYOUT_RATIO,
                    joinedAt: String(account.createdAt || "").slice(0, 10) || nowStamp().slice(0, 10),
                    notes: "司机在登录页自助注册。"
                });
            });
            return nextDrivers;
        }

        function loadAdminData() {
            const saved = safeParse(localStorage.getItem(ADMIN_STORAGE_KEY), {});
            return {
                drivers: normalizeDrivers(saved.drivers),

                updatedAt: saved.updatedAt || ""

        function saveAdminData() {
            state.adminData.updatedAt = nowStamp();
            localStorage.setItem(ADMIN_STORAGE_KEY, JSON.stringify(state.adminData));
        }

        function applyRemoteAdminRuntime(remoteRuntime, remoteDrivers = null) {
            const baseDrivers = Array.isArray(remoteDrivers) && remoteDrivers.length
                ? remoteDrivers
                : Array.isArray(remoteRuntime?.drivers) && remoteRuntime.drivers.length
                    ? remoteRuntime.drivers
                    : state.adminData.drivers;
            state.adminData = {
                drivers: normalizeDrivers(baseDrivers),
                orderOps: remoteRuntime?.orderOps && typeof remoteRuntime.orderOps === "object" ? remoteRuntime.orderOps : {},
                updatedAt: remoteRuntime?.updatedAt || state.adminData.updatedAt || ""
            };
            saveAdminData();
        }

        async function backfillAssignedOrdersToCloud() {
            const missingOrders = (state.orders || []).filter(order => {
                const feedAssignedAccount = normalizePhone(order.assignedDriverAccount || "");
                if (!feedAssignedAccount) {
                    return false;
                }
                const op = state.adminData.orderOps[order.key] || {};
                if (op.forceUnassigned) {
                    return false;
                }
                return !normalizePhone(op.assignedDriverAccount || "")
                    && !String(op.assignedDriverId || "").trim()
                    && !String(op.assignedDriverName || "").trim()
                    && !String(op.flowStatus || "").trim();
            });
            if (!missingOrders.length) {
                return false;
            }

            let remoteRuntime = null;
            for (const order of missingOrders) {
                const driver = state.adminData.drivers.find(item => normalizePhone(item.phone) === normalizePhone(order.assignedDriverAccount || ""));
                remoteRuntime = await upsertRemoteOrderOp(order.key, {
                    assignedDriverId: driver ? driver.id : "",
                    assignedDriverAccount: normalizePhone(order.assignedDriverAccount || ""),
                    assignedDriverName: order.assignedDriverName || (driver ? driver.name : ""),
                    flowStatus: "assigned",
                    internalStatus: "已指派",
                    forceUnassigned: false,
                    driverPayable: roundMoney(state.adminData.orderOps[order.key]?.driverPayable ?? defaultDriverPayable(order, driver ? driver.id : ""))
                });
            }

            if (!remoteRuntime) {
                return false;
            }

            applyRemoteAdminRuntime(remoteRuntime);
            state.runtimeData = loadRuntimeData();
            state.orders = buildOrderRecords().map(order => ({
                ...order,
                op: {
                    ...order.op,
                    internalStatus: order.op.internalStatus || defaultInternalStatus(order)
                }
            }));
            renderAllPanels();
            return true;
        }

                ownerOrders: Array.isArray(runtime.ownerOrders) ? runtime.ownerOrders : [],

            };

        async function sha256(text) {
            const bytes = new TextEncoder().encode(text);
            const digest = await crypto.subtle.digest("SHA-256", bytes);
            return Array.from(new Uint8Array(digest)).map(byte => byte.toString(16).padStart(2, "0")).join("");
        }

        function hasValidAdminSession() {
            const session = safeParse(localStorage.getItem(ADMIN_SESSION_KEY), null);
            return Boolean(session && session.account === ADMIN_ACCOUNT && Number(session.expiresAt) > Date.now());
        }

            }));

        function driverStatusMeta(status) {
            return status === "inactive"
                ? { label: "已停用", className: "red" }
                : { label: "可接单", className: "green" };
        }

        function flowMeta(flowStatus, order) {
            if (flowStatus === "in_progress") {
                const map = {
                    waiting_pickup: "等待提货",
                    picked_up: "已提货",
                    in_transit: "派送途中",
                    completed: "已完成"
                };
                return {
                    label: map[order.runtimeStatus] || "进行中",
                    className: order.runtimeStatus === "picked_up" ? "blue" : "orange"
                };
            }
            if (flowStatus === "completed") {
                return { label: "已完成", className: "green" };
            }
            if (flowStatus === "grabbed") {
                return { label: "已被抢单", className: "blue" };
            }
            if (flowStatus === "assigned") {
                return { label: "已指派", className: "blue" };
            }
            return { label: "待抢单", className: "orange" };
        }

        function hasPendingDriverPriceRequest(order) {
            const requestedPrice = Number(order?.op?.driverRequestedPrice || 0);
            const requestStatus = String(order?.op?.driverQuoteStatus || (requestedPrice > 0 ? "pending" : ""));
            return requestedPrice > 0 && requestStatus !== "approved" && requestStatus !== "rejected";
        }

        function appendInternalNote(currentNotes, line) {
            return [String(currentNotes || "").trim(), String(line || "").trim()].filter(Boolean).join("\n");
        }

        function deriveFlowStateFromInternalStatus(status = "", fallbackFlow = "pending") {
            const normalized = String(status || "").trim();
            if (normalized === "已完成") {
                return { flowStatus: "completed", runtimeStatus: "completed" };
            }
            if (normalized === "等待提货") {
                return { flowStatus: "in_progress", runtimeStatus: "waiting_pickup" };
            }
            if (normalized === "已提货") {
                return { flowStatus: "in_progress", runtimeStatus: "picked_up" };
            }
            if (normalized === "派送途中") {
                return { flowStatus: "in_progress", runtimeStatus: "in_transit" };
            }
            if (normalized === "已指派" || normalized === "司机申请调价") {
                return { flowStatus: "assigned", runtimeStatus: "" };
            }
            if (normalized === "待分配" || normalized === "异常待处理") {
                return { flowStatus: "pending", runtimeStatus: "" };
            }
            return { flowStatus: fallbackFlow || "pending", runtimeStatus: "" };
        }

        function clearanceMeta(label) {
            if (label === "已放行") {
                return { label, className: "green" };
            }
            if (label === "查验中") {
                return { label, className: "red" };
            }
            if (label === "待放行") {
                return { label, className: "red" };
            }
            return { label: label || "未同步", className: "blue" };
        }

        function sourceLabel(sourceType) {
            return sourceType === "owner_portal" ? "货主发布" : "ERP自动单";
        }

        function ownerLifecycleToFlow(status) {
            if (status === "completed") {
                return "completed";
            }
            if (status === "grabbed") {
                return "grabbed";
            }
            return "pending";
        }

        function effectiveFlowStatus(order) {
            if (order.op?.forceUnassigned) {
                return "pending";
            }
            if (order.op?.flowStatus) {
                return order.op.flowStatus;
            }
            if (String(order.op?.internalStatus || "").trim() === "已完成") {
                return "completed";
            }
            if (["等待提货", "已提货", "派送途中"].includes(String(order.op?.internalStatus || "").trim())) {
                return "in_progress";
            }
            if (["已指派", "司机申请调价"].includes(String(order.op?.internalStatus || "").trim())) {
                return "assigned";
            }
            if (order.flowStatus === "completed") {
                return "completed";
            }
            if (order.flowStatus === "in_progress") {
                return "in_progress";
            }
            if (order.flowStatus === "grabbed") {
                return "grabbed";
            }
            if (order.op?.assignedDriverId || order.op?.assignedDriverAccount || order.assignedDriverAccount || order.assignedDriverName) {
                return "assigned";
            }
            return "pending";
        }

        function resolveAssignedDriverId(order, existingAssignedDriverId = "", forceUnassigned = false) {
            if (forceUnassigned) {
                return "";
            }
            if (existingAssignedDriverId) {
                return existingAssignedDriverId;
            }
            const opAssignedAccount = normalizePhone(order.op?.assignedDriverAccount || "");
            if (opAssignedAccount) {
                const byOpPhone = state.adminData.drivers.find(driver => normalizePhone(driver.phone) === opAssignedAccount);
                if (byOpPhone) {
                    return byOpPhone.id || "";
                }
            }
            const assignedAccount = normalizePhone(order.assignedDriverAccount || "");
            if (assignedAccount) {
                const byPhone = state.adminData.drivers.find(driver => normalizePhone(driver.phone) === assignedAccount);
                if (byPhone) {
                    return byPhone.id || "";
                }
            }
            const assignedName = String(order.assignedDriverName || "").trim().toLowerCase();
            if (assignedName) {
                const byName = state.adminData.drivers.find(driver => String(driver.name || "").trim().toLowerCase() === assignedName);
                if (byName) {
                    return byName.id || "";
                }
            }
            return "";
        }

        function baseOrderRecord(order, sourceType) {
            return {
                key: orderKey(order),
                id: order.id || "",
                orderCode: order.orderCode || "",
                sourceType,
                sourceLabel: sourceLabel(sourceType),
                flowStatus: sourceType === "owner_portal" ? ownerLifecycleToFlow(order.ownerLifecycleStatus) : "pending",
                runtimeStatus: order.status || "",
                state: order.state || "",
                pickup: order.pickup || "",
                dropoff: order.dropoff || "",
                pickupAddress: order.pickupAddress || "",
                dropoffAddress: order.dropoffAddress || "",
                scheduledPickupTime: order.expectedPickupTime || order.scheduledPickupTime || order.time || "",
                actualPickupTime: order.actualPickupTime || "",
                deliveredAt: order.deliveredAt || "",
                price: roundMoney(order.ownerQuotedPrice || order.price || 0),
                systemEstimatedPrice: roundMoney(order.systemEstimatedPrice || 0),
                pallets: Number(order.pallets || 0),
                pieces: Number(order.pieces || 0),
                weight: order.weight || "",
                cbm: Number(order.cbm || 0),
                clearanceStatusLabel: order.showClearanceSuffix === false ? "" : (order.clearanceStatusLabel || ""),
                pickupTimeLabel: order.pickupTimeLabel || "",
                provider: order.provider || "",
                remarks: order.remarks || "",
                ownerName: order.ownerName || "",
                ownerPhone: order.ownerPhone || "",
                assignedDriverAccount: normalizePhone(order.assignedDriverAccount || ""),
                assignedDriverName: order.assignedDriverName || "",
                driverAcceptedAt: order.driverAcceptedAt || "",
                quoteAdjustedAt: order.quoteAdjustedAt || "",
                createdAt: order.createdAt || "",
                isMergedOrder: Boolean(order.isMergedOrder),
                mergedOrderCount: Number(order.mergedOrderCount || 0),
                mergedOrderCodes: Array.isArray(order.mergedOrderCodes) ? order.mergedOrderCodes : [],
                mergeLabel: order.mergeLabel || "",
                raw: order
            };
        }

        function buildOrderRecords() {
            const records = new Map();
            const feedOrders = Array.isArray(window.AULALA_ORDER_FEED?.orders) ? window.AULALA_ORDER_FEED.orders : [];

            feedOrders.forEach(order => {
                const record = baseOrderRecord(order, "erp_auto");
                records.set(record.key, record);
            });

            state.runtimeData.ownerOrders.forEach(order => {
                const record = baseOrderRecord(order, "owner_portal");
                records.set(record.key, {
                    ...(records.get(record.key) || {}),
                    ...record
                });
            });

            if (state.runtimeData.activeOrder) {
                const activeRecord = baseOrderRecord(
                    state.runtimeData.activeOrder,
                    state.runtimeData.activeOrder.sourceType === "owner_portal" ? "owner_portal" : "erp_auto"
                );
                activeRecord.flowStatus = "in_progress";
                records.set(activeRecord.key, {
                    ...(records.get(activeRecord.key) || {}),
                    ...activeRecord
                });
            }

            state.runtimeData.completedOrders.forEach(order => {
                const completedRecord = baseOrderRecord(
                    order,
                    order.sourceType === "owner_portal" ? "owner_portal" : "erp_auto"
                );
                completedRecord.flowStatus = "completed";
                records.set(completedRecord.key, {
                    ...(records.get(completedRecord.key) || {}),
                    ...completedRecord
                });
            });

            return Array.from(records.values())
                .map(record => {
                    const op = getOrderOp(record);
                    return {
                        ...record,
                        assignedDriverAccount: op.assignedDriverAccount || record.assignedDriverAccount,
                        assignedDriverName: op.assignedDriverName || record.assignedDriverName,
                        driverAcceptedAt: op.driverAcceptedAt || record.driverAcceptedAt,
                        actualPickupTime: op.actualPickupTime || record.actualPickupTime,
                        deliveredAt: op.deliveredAt || record.deliveredAt,
                        op
                    };
                })
                .sort((a, b) => {
                    const flowRank = { pending: 0, assigned: 1, grabbed: 2, in_progress: 3, completed: 4 };
                    const rankDelta = (flowRank[effectiveFlowStatus(a)] ?? 9) - (flowRank[effectiveFlowStatus(b)] ?? 9);
                    if (rankDelta !== 0) {
                        return rankDelta;
                    }
                    return String(b.scheduledPickupTime || "").localeCompare(String(a.scheduledPickupTime || ""));
                });
        }

        function defaultInternalStatus(order) {
            if (hasPendingDriverPriceRequest(order)) {
                return "司机申请调价";
            }
            const flowStatus = effectiveFlowStatus(order);
            if (flowStatus === "completed") {
                return "已完成";
            }
            if (flowStatus === "in_progress") {
                return flowMeta(flowStatus, order).label;
            }
            if (flowStatus === "assigned") {
                return "已指派";
            }
            return "待分配";
        }

        function defaultDriverPayable(order, assignedDriverId = "") {
            const driver = state.adminData.drivers.find(item => item.id === assignedDriverId);
            const ratio = driver ? Number(driver.payoutRatio || DEFAULT_DRIVER_PAYOUT_RATIO) : DEFAULT_DRIVER_PAYOUT_RATIO;
            return roundMoney(Number(order.price || 0) * ratio);
        }

        function getOrderOp(order) {
            const existing = state.adminData.orderOps[order.key] || {};
            const feedAssignedDriverId = resolveAssignedDriverId(order, existing.assignedDriverId || "", Boolean(existing.forceUnassigned));
            return {
                assignedDriverId: feedAssignedDriverId,
                assignedDriverAccount: normalizePhone(existing.assignedDriverAccount || order.assignedDriverAccount || ""),
                assignedDriverName: String(existing.assignedDriverName || order.assignedDriverName || "").trim(),
                flowStatus: String(existing.flowStatus || "").trim(),
                runtimeStatus: String(existing.runtimeStatus || order.runtimeStatus || "").trim(),
                driverAcceptedAt: existing.driverAcceptedAt || order.driverAcceptedAt || "",
                actualPickupTime: existing.actualPickupTime || order.actualPickupTime || "",
                deliveredAt: existing.deliveredAt || order.deliveredAt || "",
                signaturePhoto: existing.signaturePhoto || order.signaturePhoto || "",
                podDownloadUrl: existing.podDownloadUrl || order.podDownloadUrl || "",
                podFilename: existing.podFilename || order.podFilename || "",
                podGeneratedAt: existing.podGeneratedAt || order.podGeneratedAt || "",
                internalStatus: existing.internalStatus || "",
                internalNotes: existing.internalNotes || "",
                driverRequestedPrice: Number(existing.driverRequestedPrice || 0),
                driverQuoteReason: existing.driverQuoteReason || "",
                driverQuoteRequestedAt: existing.driverQuoteRequestedAt || "",
                driverQuoteStatus: existing.driverQuoteStatus || (Number(existing.driverRequestedPrice || 0) > 0 ? "pending" : ""),
                agreedDriverPrice: roundMoney(existing.agreedDriverPrice || 0),
                forceUnassigned: Boolean(existing.forceUnassigned),
                customerReceivable: roundMoney(existing.customerReceivable ?? order.price ?? 0),
                driverPayable: roundMoney(existing.driverPayable ?? defaultDriverPayable(order, feedAssignedDriverId)),
                receivableStatus: existing.receivableStatus || "待收款",
                payableStatus: existing.payableStatus || "待结算",
                updatedAt: existing.updatedAt || ""
            };
        }

        async function persistOrderOp(orderKeyValue, partial) {
            const current = state.adminData.orderOps[orderKeyValue] || {};
            const next = {
                ...current,
                ...partial,
                updatedAt: nowStamp()
            };
            state.adminData.orderOps[orderKeyValue] = next;
            saveAdminData();
            try {
                const remoteRuntime = await upsertRemoteOrderOp(orderKeyValue, next);
                applyRemoteAdminRuntime(remoteRuntime);
                refreshData();
            } catch (error) {
                console.error("persist order op failed", error);
                throw new Error(error?.message || "订单状态同步到服务器失败。");
            }
        }

        function getDriverOrderStats(orders) {
            return orders.reduce((acc, order) => {
                const driverId = order.op.assignedDriverId;
                if (!driverId) {
                    return acc;
                }
                acc[driverId] = acc[driverId] || { total: 0, active: 0, completed: 0 };
                acc[driverId].total += 1;
                if (order.flowStatus === "completed") {
                    acc[driverId].completed += 1;
                } else {
                    acc[driverId].active += 1;
                }
                return acc;
            }, {});
        }

        function activeDriverCount() {
            return state.adminData.drivers.filter(driver => driver.status === "active").length;
        }

        function filteredOrders() {
            return state.orders.filter(order => {
                if (state.orderFilter.flowStatus === "price_request" && !hasPendingDriverPriceRequest(order)) {
                    return false;
                }
                const flowStatus = effectiveFlowStatus(order);
                if (state.orderFilter.flowStatus !== "all" && state.orderFilter.flowStatus !== "price_request" && flowStatus !== state.orderFilter.flowStatus) {
                    return false;
                }
                if (state.orderFilter.sourceType !== "all" && order.sourceType !== state.orderFilter.sourceType) {
                    return false;
                }
                if (state.orderFilter.state !== "all" && order.state !== state.orderFilter.state) {
                    return false;
                }
                const query = state.orderFilter.query.trim().toLowerCase();
                if (!query) {
                    return true;
                }
                return [
                    order.orderCode,
                    (order.mergedOrderCodes || []).join(" "),
                    order.pickupAddress,
                    order.dropoffAddress,
                    order.pickup,
                    order.dropoff,
                    order.ownerName,
                    order.ownerPhone,
                    order.remarks,
                    order.op.internalNotes
                ].join(" ").toLowerCase().includes(query);
            }).sort((left, right) => {
                const leftTime = String(left.scheduledPickupTime || "9999-12-31 23:59");
                const rightTime = String(right.scheduledPickupTime || "9999-12-31 23:59");
                const timeCompare = leftTime.localeCompare(rightTime);
                if (timeCompare !== 0) {
                    return timeCompare;
                }
                return String(left.orderCode || left.key || "").localeCompare(String(right.orderCode || right.key || ""));
            });
        }

        function filteredFinanceOrders() {
            return state.orders.filter(order => {
                if (state.financeFilter.settlement === "receivable_pending" && order.op.receivableStatus === "已收款") {
                    return false;
                }
                if (state.financeFilter.settlement === "payable_pending" && order.op.payableStatus === "已结算") {
                    return false;
                }
                if (state.financeFilter.settlement === "completed_only" && effectiveFlowStatus(order) !== "completed") {
                    return false;
                }
                return true;
            });
        }

        function financeSummary(orders) {
            const totals = {
                receivable: 0,
                payable: 0,
                collected: 0,
                settled: 0
            };
            orders.forEach(order => {
                totals.receivable += Number(order.op.customerReceivable || 0);
                totals.payable += Number(order.op.driverPayable || 0);
                if (order.op.receivableStatus === "已收款") {
                    totals.collected += Number(order.op.customerReceivable || 0);
                }
                if (order.op.payableStatus === "已结算") {
                    totals.settled += Number(order.op.driverPayable || 0);
                }
            });
            totals.gross = totals.receivable - totals.payable;
            totals.pendingReceivable = totals.receivable - totals.collected;
            totals.pendingPayable = totals.payable - totals.settled;
            return totals;
        }

        function clearAdminRefreshTimer() {
            if (adminRefreshTimer) {
                clearTimeout(adminRefreshTimer);
                adminRefreshTimer = null;
            }

        function scheduleAdminRefresh(delay = LIVE_ADMIN_REFRESH_INTERVAL_MS) {
            clearAdminRefreshTimer();
            if (document.getElementById("admin-shell").classList.contains("hidden")) {
                return;
            }
            adminRefreshTimer = window.setTimeout(() => {
                if (document.hidden) {
                    scheduleAdminRefresh();
                    return;
                }
                void refreshData({ immediate: true });
            }, delay);
        }

        async function refreshData(options = {}) {
            const { immediate = false } = options;
            if (document.getElementById("admin-shell").classList.contains("hidden")) {
                return;
            }
            if (document.hidden && !immediate) {
                scheduleAdminRefresh();
                return;
            }
            if (adminRefreshInFlight) {
                adminRefreshQueued = true;
                return;
            }
            adminRefreshInFlight = true;
            state.adminData = loadAdminData();
            state.runtimeData = loadRuntimeData();
            state.orders = buildOrderRecords().map(order => ({
                ...order,
                op: {
                    ...order.op,
                    internalStatus: order.op.internalStatus || defaultInternalStatus(order)
                }
            }));
            renderAllPanels();
            try {
                const [driversResult, runtimeResult] = await Promise.allSettled([fetchRemoteDrivers(), fetchRemoteAdminRuntime()]);
                const remoteDrivers = driversResult.status === "fulfilled" ? driversResult.value : null;
                const remoteRuntime = runtimeResult.status === "fulfilled" ? runtimeResult.value : null;
                if (remoteRuntime || remoteDrivers) {
                    applyRemoteAdminRuntime(remoteRuntime || state.adminData, remoteDrivers);
                    state.runtimeData = loadRuntimeData();
                    state.orders = buildOrderRecords().map(order => ({
                        ...order,
                        op: {
                            ...order.op,
                            internalStatus: order.op.internalStatus || defaultInternalStatus(order)
                        }
                    }));
                    renderAllPanels();
                }
                backfillAssignedOrdersToCloud().catch(error => {
                    console.warn("backfill assigned orders to cloud failed", error);
                });
                if (driversResult.status === "rejected") {
                    console.warn("fetch remote drivers failed", driversResult.reason);
                }
                if (runtimeResult.status === "rejected") {
                    console.warn("fetch remote admin runtime failed", runtimeResult.reason);
                }
            } catch (error) {
                console.warn("refresh admin remote state failed", error);
            } finally {
                adminRefreshInFlight = false;
                if (adminRefreshQueued) {
                    adminRefreshQueued = false;
                    window.setTimeout(() => {
                        void refreshData({ immediate: true });
                    }, 0);
                } else {
                    scheduleAdminRefresh();
                }
            }
        }

        async function saveDriverModal(existingId = "") {
            const nextDriver = {
                id: document.getElementById("driver-id").value.trim() || existingId || `DRV-${String(state.adminData.drivers.length + 1).padStart(3, "0")}`,
                name: document.getElementById("driver-name").value.trim(),
                phone: document.getElementById("driver-phone").value.trim(),
                vehicleType: document.getElementById("driver-vehicle").value,
                plate: document.getElementById("driver-plate").value.trim(),
                city: document.getElementById("driver-city").value.trim() || "Sydney",
                status: document.getElementById("driver-status").value,
                settlementCycle: document.getElementById("driver-settlement").value,
                bankTail: document.getElementById("driver-bank-tail").value.trim(),
                payoutRatio: Number(document.getElementById("driver-payout-ratio").value || DEFAULT_DRIVER_PAYOUT_RATIO),
                joinedAt: nowStamp().slice(0, 10),
                notes: document.getElementById("driver-notes").value.trim()
            };

            if (!nextDriver.name || !nextDriver.phone) {
                alert("请至少填写司机姓名和手机号。");
                return;
            }

            const duplicate = state.adminData.drivers.find(driver => driver.id === nextDriver.id && driver.id !== existingId);
            if (duplicate) {
                alert("司机编号已存在，请换一个编号。");
                return;
            }

            const existingIndex = state.adminData.drivers.findIndex(driver => driver.id === existingId || driver.id === nextDriver.id);
            if (existingIndex >= 0) {
                state.adminData.drivers.splice(existingIndex, 1, nextDriver);
            } else {
                state.adminData.drivers.unshift(nextDriver);
            }

            saveAdminData();
            try {
                const remoteRuntime = await pushRemoteAdminRuntime(state.adminData);
                applyRemoteAdminRuntime(remoteRuntime);
                refreshData();
                closeModal();
            } catch (error) {
                console.error("save driver modal failed", error);
                alert(error?.message || "司机资料同步到服务器失败。");
            }
        }

            try {

                    flowStatus: driverId ? "assigned" : "pending",

                    forceUnassigned: false

                    <div>
                        <label class="field-label">清关状态</label>
                        <input class="field" type="text" value="${escapeHtml(clearance.label)}" disabled>
                    </div>
                    <div class="full-span">
                        <label class="field-label">提货地址</label>
                        <input class="field" type="text" value="${escapeHtml(order.pickupAddress)}" disabled>
                    </div>
                    <div class="full-span">
                        <label class="field-label">送货地址</label>
                        <input class="field" type="text" value="${escapeHtml(order.dropoffAddress)}" disabled>
                    </div>
                    <div>
                        <label class="field-label">计划提货时间</label>
                        <input class="field" type="text" value="${escapeHtml(order.scheduledPickupTime || "--")}" disabled>
                    </div>
                    <div>
                        <label class="field-label">实际送达时间</label>
                        <input class="field" type="text" value="${escapeHtml(order.deliveredAt || "--")}" disabled>
                    </div>
                    <div>
                        <label class="field-label">指派司机</label>
                        <select id="order-modal-driver" class="select">${driverOptionsHtml(order.op.assignedDriverId)}</select>
                    </div>
                    <div>
                        <label class="field-label">内部状态</label>
                        <select id="order-modal-internal-status" class="select">
                            ${["待分配", "已指派", "司机申请调价", "等待提货", "已提货", "派送途中", "已完成", "异常待处理"].map(option => `<option value="${option}" ${order.op.internalStatus === option ? "selected" : ""}>${option}</option>`).join("")}
                        </select>
                    </div>
                    <div>
                        <label class="field-label">客户应收</label>
                        <input id="order-modal-receivable" class="field" type="number" min="0" step="0.01" value="${roundMoney(order.op.customerReceivable)}">
                    </div>
                    <div>
                        <label class="field-label">司机应付</label>
                        <input id="order-modal-payable" class="field" type="number" min="0" step="0.01" value="${roundMoney(order.op.driverPayable)}">
                    </div>
                    <div>
                        <label class="field-label">收款状态</label>
                        <select id="order-modal-receivable-status" class="select">
                            <option value="待收款" ${order.op.receivableStatus === "待收款" ? "selected" : ""}>待收款</option>
                            <option value="已收款" ${order.op.receivableStatus === "已收款" ? "selected" : ""}>已收款</option>
                        </select>
                    </div>
                    <div>
                        <label class="field-label">司机结算状态</label>
                        <select id="order-modal-payable-status" class="select">
                            <option value="待结算" ${order.op.payableStatus === "待结算" ? "selected" : ""}>待结算</option>
                            <option value="已结算" ${order.op.payableStatus === "已结算" ? "selected" : ""}>已结算</option>
                        </select>
                    </div>
                    ${order.op.agreedDriverPrice ? `
                    <div>
                        <label class="field-label">已同意司机运费</label>
                        <input class="field" type="text" value="${escapeHtml(formatCurrency(order.op.agreedDriverPrice))}" disabled>
                    </div>
                    <div>
                        <label class="field-label">调价处理结果</label>
                        <input class="field" type="text" value="${escapeHtml(order.op.driverQuoteStatus || "--")}" disabled>
                    </div>
                    ` : ""}
                    ${order.op.driverRequestedPrice ? `
                    <div>
                        <label class="field-label">司机申请运费</label>
                        <input class="field" type="text" value="${escapeHtml(formatCurrency(order.op.driverRequestedPrice))}" disabled>
                    </div>
                    <div>
                        <label class="field-label">申请时间</label>
                        <input class="field" type="text" value="${escapeHtml(order.op.driverQuoteRequestedAt || "--")}" disabled>
                    </div>
                    <div class="full-span">
                        <label class="field-label">调价原因</label>
                        <textarea class="textarea" disabled>${escapeHtml(order.op.driverQuoteReason || "--")}</textarea>
                    </div>
                    ` : ""}
                    <div class="full-span">
                        <label class="field-label">内部备注</label>
                        <textarea id="order-modal-notes" class="textarea" placeholder="例如预约要求、异常说明、客户回款情况等">${escapeHtml(order.op.internalNotes || order.remarks || "")}</textarea>
                    </div>
                    ${hasPendingDriverPriceRequest(order) ? `
                    <div class="full-span">
                        <div class="request-card-actions">
                            <button class="btn btn-primary" type="button" onclick="approveDriverQuote('${encodeKey(order.key)}'); closeModal();">同意继续指派</button>
                            <button class="btn btn-danger" type="button" onclick="rejectDriverQuote('${encodeKey(order.key)}'); closeModal();">驳回回大厅</button>
                        </div>
                    </div>
                    ` : ""}
                </div>
                <div class="modal-actions">
                    <button class="btn btn-secondary" type="button" onclick="closeModal()">取消</button>
                    <button class="btn btn-primary" type="button" onclick="saveOrderModal('${encodeKey(order.key)}')">保存订单</button>
                </div>
            `);
        }

        async function saveOrderModal(encodedOrderKey) {
            const key = decodeKey(encodedOrderKey);
            const order = state.orders.find(item => item.key === key);
            if (!order) {
                return;
            }
            const driverId = document.getElementById("order-modal-driver").value;
            const driver = state.adminData.drivers.find(item => item.id === driverId);
            const internalStatus = document.getElementById("order-modal-internal-status").value;
            const derivedFlow = deriveFlowStateFromInternalStatus(internalStatus, driverId ? (order.op.flowStatus || "assigned") : "pending");
            try {
                await persistOrderOp(key, {
                    assignedDriverId: driverId,
                    assignedDriverAccount: driver ? normalizePhone(driver.phone) : "",
                    assignedDriverName: driver ? driver.name : "",
                    flowStatus: derivedFlow.flowStatus,
                    runtimeStatus: derivedFlow.runtimeStatus || order.op.runtimeStatus || "",
                    internalStatus,
                    customerReceivable: roundMoney(document.getElementById("order-modal-receivable").value),
                    driverPayable: roundMoney(document.getElementById("order-modal-payable").value),
                    receivableStatus: document.getElementById("order-modal-receivable-status").value,
                    payableStatus: document.getElementById("order-modal-payable-status").value,
                    internalNotes: document.getElementById("order-modal-notes").value.trim(),
                    forceUnassigned: driverId ? false : order.op.forceUnassigned
                });
                closeModal();
            } catch (error) {
                alert(error?.message || "保存订单失败，请稍后重试。");
            }
        }

        function exportFinanceCsv() {
            const rows = [
                ["订单号", "来源", "状态", "司机", "客户应收", "收款状态", "司机应付", "结算状态", "毛利", "提货地址", "送货地址"]
            ];
            filteredFinanceOrders().forEach(order => {
                const driver = state.adminData.drivers.find(item => item.id === order.op.assignedDriverId);
                rows.push([
                    order.orderCode || order.key,
                    order.sourceLabel,
                    flowMeta(effectiveFlowStatus(order), order).label,
                    driver ? `${driver.name} ${driver.phone}` : "未分配",
                    order.op.customerReceivable,
                    order.op.receivableStatus,
                    order.op.driverPayable,
                    order.op.payableStatus,
                    roundMoney(order.op.customerReceivable - order.op.driverPayable),
                    order.pickupAddress,
                    order.dropoffAddress
                ]);
            });

            const csv = rows.map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(",")).join("\n");
            const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8;" });
            const url = URL.createObjectURL(blob);
            const anchor = document.createElement("a");
            anchor.href = url;
            anchor.download = `aulala-finance-${Date.now()}.csv`;
            anchor.click();
            URL.revokeObjectURL(url);
        }

        async function handleAdminLogin(event) {
            event.preventDefault();
            clearStatusBanner();
            const account = document.getElementById("admin-account").value.trim();
            const password = document.getElementById("admin-password").value;

            if (!account || !password) {
                showStatusBanner("请输入管理员账号和密码。");
                return;
            }

            const passwordHash = await sha256(password);
            if (account !== ADMIN_ACCOUNT || passwordHash !== ADMIN_PASSWORD_HASH) {
                showStatusBanner("管理员账号或密码不正确。");
                return;
            }

            createAdminSession();
            bootstrapAdmin();
        }

        function bootstrapAdmin() {
            state.adminData = loadAdminData();
            state.runtimeData = loadRuntimeData();
            document.getElementById("admin-login-view").classList.add("hidden");
            document.getElementById("admin-shell").classList.remove("hidden");
            void refreshData({ immediate: true });
            switchPanel(state.currentPanel);
        }

        function logoutAdmin() {
            clearAdminRefreshTimer();
            clearAdminSession();
            document.getElementById("admin-shell").classList.add("hidden");
            document.getElementById("admin-login-view").classList.remove("hidden");
            document.getElementById("admin-login-form").reset();
            clearStatusBanner();
        }

        document.getElementById("admin-login-form").addEventListener("submit", handleAdminLogin);
        document.getElementById("refresh-admin-btn").addEventListener("click", refreshData);
        document.getElementById("export-finance-btn").addEventListener("click", exportFinanceCsv);
        document.getElementById("logout-admin-btn").addEventListener("click", logoutAdmin);
        document.getElementById("modal-close-btn").addEventListener("click", closeModal);
        document.getElementById("modal-shell").addEventListener("click", event => {
            if (event.target.id === "modal-shell") {
                closeModal();
            }
        });
        window.addEventListener("storage", event => {
            if (![ADMIN_STORAGE_KEY, APP_STORAGE_KEY, DRIVER_ACCOUNTS_KEY].includes(event.key)) {
                return;
            }
            if (document.getElementById("admin-shell").classList.contains("hidden")) {
                return;
            }
            void refreshData({ immediate: true });
            switchPanel(state.currentPanel);
        });
        document.addEventListener("visibilitychange", () => {
            if (!document.hidden && !document.getElementById("admin-shell").classList.contains("hidden")) {
                void refreshData({ immediate: true });
            }
        });
        window.addEventListener("focus", () => {
            if (!document.getElementById("admin-shell").classList.contains("hidden")) {
                void refreshData({ immediate: true });
            }
        });
        window.addEventListener("pageshow", () => {
            if (!document.getElementById("admin-shell").classList.contains("hidden")) {
                void refreshData({ immediate: true });
            }
        });
        window.addEventListener("beforeunload", clearAdminRefreshTimer);
        document.querySelectorAll(".nav-item").forEach(button => {
            button.addEventListener("click", () => switchPanel(button.dataset.panel));
        });

        if (hasValidAdminSession()) {
            bootstrapAdmin();
        }

        window.openDriverModal = openDriverModal;
        window.toggleDriverStatus = toggleDriverStatus;
        window.assignDriverInline = assignDriverInline;
        window.quickToggleReceivable = quickToggleReceivable;
        window.quickTogglePayable = quickTogglePayable;
        window.approveDriverQuote = approveDriverQuote;
        window.rejectDriverQuote = rejectDriverQuote;
        window.openOrderModal = openOrderModal;
        window.saveDriverModal = saveDriverModal;
        window.saveOrderModal = saveOrderModal;
        window.closeModal = closeModal;
    </script>
</body>
</html>
