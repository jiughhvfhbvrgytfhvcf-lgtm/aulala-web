<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aulala | 澳洲货运中心</title>
    <style>
        :root { --primary: #002b7f; --accent: #e63946; --bg: #f4f7f9; --border: #e0e0e0; --success: #28a745; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: #1a1b1e; line-height: 1.5; }
        
        /* 导航栏 */
        header { 
            background: var(--primary); color: white; padding: 12px 15px; 
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .logo { font-weight: 800; font-size: 18px; letter-spacing: 0.5px; cursor: pointer; }
        .nav-btns a { color: white; text-decoration: none; font-size: 12px; margin-left: 5px; border: 1px solid rgba(255,255,255,0.3); padding: 5px 10px; border-radius: 15px; }

        /* 搜索条 */
        .filter-section {
            background: white; padding: 10px; display: flex; align-items: center; gap: 8px;
            position: sticky; top: 49px; z-index: 999; border-bottom: 1px solid #eee;
        }
        .filter-item { height: 38px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; outline: none; background: white; }
        #date-filter { width: 30%; padding: 0 5px; } 
        #state-filter { width: 22%; padding: 0 5px; } 
        #suburb-input { flex-grow: 1; padding: 0 12px; width: 43%; } 
        
        .container { padding: 12px; max-width: 600px; margin: 0 auto; }

        /* 卡片基础 */
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.03); border: 1px solid #f0f0f0; }
        .card-header { display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center; }
        .price { color: var(--accent); font-size: 20px; font-weight: 800; }
        .status-tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
        .status-ongoing { background: #e7f5ff; color: #1971c2; }
        .status-done { background: #ebfbee; color: #2b8a3e; }

        /* 地址导航 */
        .addr-box { position: relative; padding-left: 20px; font-size: 14px; border-left: 2px dotted #ddd; margin: 10px 0 10px 8px; }
        .addr { margin-bottom: 12px; position: relative; display: block; text-decoration: none; color: inherit; }
        .dot { position: absolute; left: -26px; top: 5px; width: 10px; height: 10px; border-radius: 50%; }
        .nav-icon { float: right; font-size: 11px; color: var(--primary); border: 1px solid var(--primary); padding: 1px 6px; border-radius: 4px; }

        /* 进行中订单专用：图片上传区 */
        .upload-area { display: flex; gap: 10px; margin: 15px 0; }
        .upload-btn { 
            width: 70px; height: 70px; border: 2px dashed #ccc; border-radius: 8px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 10px; color: #999; cursor: pointer; background: #fafafa;
        }
        .preview-img { width: 70px; height: 70px; border-radius: 8px; object-fit: cover; display: none; border: 1px solid #eee; }

        /* 详情弹窗 (Modal) */
        #detail-modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); z-index: 2000; display: none; 
            overflow-y: auto; padding: 20px;
        }
        .modal-content { background: white; border-radius: 16px; padding: 20px; max-width: 500px; margin: 40px auto; position: relative; }
        .close-btn { position: absolute; right: 15px; top: 15px; font-size: 24px; color: #999; cursor: pointer; }
        .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f5f5f5; font-size: 14px; }
        .proof-img { width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid #ddd; }

        .btn-main { width: 100%; background: var(--primary); color: white; border: none; padding: 12px; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-outline { width: 100%; background: white; color: var(--primary); border: 1px solid var(--primary); padding: 10px; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 13px; margin-top: 5px; }
        .hidden { display: none !important; }
        .section-title { font-size: 15px; font-weight: bold; margin: 15px 0 10px; color: var(--primary); display: flex; align-items: center; }
        .section-title::before { content: ""; width: 4px; height: 15px; background: var(--primary); margin-right: 8px; border-radius: 2px; }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="showSection('orders')">AULALA</div>
        <div class="nav-btns">
            <span id="guest-nav">
                <a href="javascript:void(0)" onclick="showSection('auth')">登录/注册</a>
            </span>
            <span id="user-nav" class="hidden">
                <a href="javascript:void(0)" onclick="showSection('profile')" style="background:rgba(255,255,255,0.2)">个人中心</a>
                <a href="javascript:void(0)" onclick="logout()">退出</a>
            </span>
        </div>
    </header>

    <section id="filter-bar" class="filter-section">
        <input type="date" id="date-filter" class="filter-item" onchange="applyFilters()">
        <select id="state-filter" class="filter-item" onchange="applyFilters()">
            <option value="">州</option><option value="NSW">NSW</option><option value="VIC">VIC</option>
        </select>
        <input type="text" id="suburb-input" class="filter-item" placeholder="区域 (Suburb)..." oninput="applyFilters()">
    </section>

    <div class="container">
        <section id="order-section">
            <div id="order-list"></div>
        </section>

        <section id="auth-section" class="hidden">
            <div class="card" style="margin-top: 20px; padding: 30px;">
                <input type="tel" id="login-phone" class="filter-item" style="width:100%; margin-bottom:15px; padding:0 15px;" placeholder="手机号 (13888888888)">
                <input type="password" id="login-pass" class="filter-item" style="width:100%; margin-bottom:15px; padding:0 15px;" placeholder="密码 (123456)">
                <button class="btn-main" onclick="handleLogin()">进入后台</button>
            </div>
        </section>

        <section id="user-profile" class="hidden">
            <div class="section-title">进行中的订单 (需拍照)</div>
            <div class="card">
                <div class="card-header"><span class="status-tag status-ongoing">运输中</span><span class="price">$85.00</span></div>
                <div class="addr-box">
                    <a href="https://www.google.com/maps" class="addr"><span class="dot" style="background:var(--success)"></span><b>提:</b> Regents Park <span class="nav-icon">导航</span></a>
                    <a href="https://www.google.com/maps" class="addr"><span class="dot" style="background:var(--accent)"></span><b>送:</b> Sydney CBD <span class="nav-icon">导航</span></a>
                </div>
                <div style="font-size:12px; color:#666; margin-bottom:5px;">请上传货物送达照片：</div>
                <div class="upload-area">
                    <div class="upload-btn" onclick="simulateUpload('p1')"><span>📷</span><span>货物拍照</span></div>
                    <img id="p1" class="preview-img" src="">
                    <div class="upload-btn" onclick="simulateUpload('p2')"><span>✍️</span><span>签单拍照</span></div>
                    <img id="p2" class="preview-img" src="">
                </div>
                <button class="btn-main" onclick="completeOrder()">提交回单并完结</button>
            </div>

            <div class="section-title">已完成的订单</div>
            <div id="history-list">
                <div class="card" style="padding-bottom:10px;">
                    <div class="card-header"><span class="status-tag status-done">已完结</span><span style="font-weight:bold">$125.00</span></div>
                    <div style="font-size:13px; color:#666;">
                        路线：Clayton → Melbourne CBD<br>
                        时间：2024-03-22 14:30
                    </div>
                    <button class="btn-outline" onclick="openDetail()">查看回单及详情</button>
                </div>
            </div>
            <button class="btn-main" style="background:#666; margin-top:15px;" onclick="showSection('orders')">返回大厅抢单</button>
        </section>
    </div>

    <div id="detail-modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeDetail()">&times;</span>
            <h3 style="color:var(--primary); margin-bottom:15px;">订单完结详情</h3>
            <div class="detail-row"><span>订单编号</span><span>AU-882910</span></div>
            <div class="detail-row"><span>结算费用</span><span style="color:var(--accent); font-weight:bold;">$125.00</span></div>
            <div class="detail-row"><span>提货时间</span><span>03-22 09:15</span></div>
            <div class="detail-row"><span>送达时间</span><span>03-22 14:30</span></div>
            <div class="detail-row"><span>车型</span><span>VAN (澳洲面包车)</span></div>
            
            <div style="margin-top:15px;">
                <p style="font-size:13px; font-weight:bold; margin-bottom:5px;">送达存证照片：</p>
                <img class="proof-img" src="https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?auto=format&fit=crop&w=500&q=80" alt="货物照片">
                <p style="font-size:13px; font-weight:bold; margin:15px 0 5px;">客户电子签名：</p>
                <img class="proof-img" style="height:100px; object-fit:contain; background:#f9f9f9;" src="https://upload.wikimedia.org/wikipedia/commons/7/7d/John_Hancock_signature.svg" alt="签名">
            </div>
            <button class="btn-main" style="margin-top:20px;" onclick="closeDetail()">关闭详情</button>
        </div>
    </div>

    <script>
        // 模拟上传图片逻辑
        function simulateUpload(id) {
            alert("正在调用手机摄像头...");
            const el = document.getElementById(id);
            // 这里使用一张演示图模拟拍照结果
            el.src = id === 'p1' ? 
                "https://images.unsplash.com/photo-1566576721346-d4a3b4eaad5b?auto=format&fit=crop&w=200&q=80" : 
                "https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=200&q=80";
            el.style.display = "block";
            el.previousElementSibling.style.display = "none";
        }

        function completeOrder() {
            if(document.getElementById('p1').style.display !== 'block') {
                alert("请先拍摄货物照片！"); return;
            }
            alert("上传成功！运费已汇入您的待结算账户。");
            location.reload(); 
        }

        function openDetail() { document.getElementById('detail-modal').style.display = "block"; }
        function closeDetail() { document.getElementById('detail-modal').style.display = "none"; }

        function handleLogin() {
            const p = document.getElementById('login-phone').value;
            const pass = document.getElementById('login-pass').value;
            if(p === '13888888888' && pass === '123456') {
                document.getElementById('guest-nav').classList.add('hidden');
                document.getElementById('user-nav').classList.remove('hidden');
                showSection('profile');
            } else { alert("账号密码错误"); }
        }

        function showSection(sec) {
            document.getElementById('order-section').style.display = (sec === 'orders' ? 'block' : 'none');
            document.getElementById('filter-bar').style.display = (sec === 'orders' ? 'flex' : 'none');
            document.getElementById('auth-section').classList.toggle('hidden', sec !== 'auth');
            document.getElementById('user-profile').classList.toggle('hidden', sec !== 'profile');
            window.scrollTo(0,0);
        }

        function logout() { location.reload(); }

        // 初始化渲染大厅
        window.onload = () => {
            const list = document.getElementById('order-list');
            const data = [
                { id: 1, price: 65, type: 'VAN', time: '2026-03-24 15:00', pickup: 'Regents Park', dropoff: 'Sydney' },
                { id: 2, price: 110, type: 'Truck', time: '2026-03-24 10:00', pickup: 'Clayton', dropoff: 'Melbourne' }
            ].sort((a,b) => new Date(a.time) - new Date(b.time));
            
            list.innerHTML = data.map(o => `
                <div class="card">
                    <div class="card-header"><span class="tag">${o.type}</span><span class="price">$${o.price}</span></div>
                    <div style="font-size:12px; margin-bottom:10px;">提货时间: <b style="color:var(--accent)">${o.time.split(' ')[1]}</b></div>
                    <div class="addr-box">
                        <div class="addr"><span class="dot" style="background:var(--success)"></span><b>提:</b> ${o.pickup}</div>
                        <div class="addr"><span class="dot" style="background:var(--accent)"></span><b>送:</b> ${o.dropoff}</div>
                    </div>
                    <button class="btn-main" onclick="alert('抢单成功！请去个人中心查看')">立即抢单</button>
                </div>
            `).join('');
        };
    </script>
</body>
</html>
