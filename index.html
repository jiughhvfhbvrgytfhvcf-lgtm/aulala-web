<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aulala | 澳洲货运抢单中心</title>
    <style>
        :root {
            --primary: #002b7f;
            --accent: #e63946;
            --bg: #f4f7f9;
            --border: #e0e0e0;
            --success: #1f9d55;
            --gold: #f08c00;
            --warning: #f59f00;
            --info: #1c7ed6;
            --muted: #667085;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: #1a1b1e;
            line-height: 1.5;
        }

        header {
            background: var(--primary);
            color: white;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
        }

        .logo {
            font-weight: 800;
            font-size: 18px;
            letter-spacing: 0.5px;
            cursor: pointer;
        }

        .nav-btns {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-btns a {
            color: white;
            text-decoration: none;
            font-size: 12px;
            border: 1px solid rgba(255, 255, 255, 0.35);
            padding: 5px 10px;
            border-radius: 16px;
        }

        .filter-section {
            background: white;
            position: sticky;
            top: 49px;
            z-index: 999;
            border-bottom: 1px solid #ebedf0;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.04);
        }

        .filter-inner {
            max-width: 624px;
            margin: 0 auto;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-item {
            height: 40px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 13px;
            outline: none;
            background: white;
            min-width: 0;
        }

        #date-filter {
            flex: 1.25;
            padding: 0 8px;
        }

        #state-filter {
            flex: 0.95;
            padding: 0 8px;
            background: #fafafa;
        }

        #suburb-input {
            flex: 1.8;
            padding: 0 12px;
        }

        .container {
            padding: 12px;
            max-width: 624px;
            margin: 0 auto;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: white;
            padding: 15px;
            border-radius: 14px;
            text-align: center;
            border: 1px solid #edf0f2;
            box-shadow: 0 5px 14px rgba(15, 23, 42, 0.04);
        }

        .stat-card.clickable {
            cursor: pointer;
            transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
        }

        .stat-card.clickable:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 22px rgba(15, 23, 42, 0.08);
            border-color: #c7d7fe;
        }

        .stat-card.active {
            border-color: #175cd3;
            box-shadow: 0 10px 24px rgba(23, 92, 211, 0.14);
        }

        .stat-val {
            display: block;
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
        }

        .stat-label {
            font-size: 12px;
            color: #7a7f87;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid #edf0f2;
            box-shadow: 0 8px 22px rgba(15, 23, 42, 0.06);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px dashed #ebedf0;
        }

        .order-code {
            font-size: 12px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 8px;
            letter-spacing: 0.2px;
        }

        .order-code-pending {
            color: #c92a2a;
        }

        .highlight-specs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .spec-tag {
            background: #fff4e6;
            color: var(--gold);
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 800;
            border: 1px solid #ffe8cc;
        }

        .price {
            color: var(--accent);
            font-size: 22px;
            font-weight: 900;
            white-space: nowrap;
        }

        .time-box {
            background: #fff5f5;
            border: 1px solid #ffe3e3;
            padding: 10px 12px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .time-box.time-box-confirmed {
            background: #ebfbee;
            border-color: #c3fae8;
        }

        .time-label {
            font-size: 12px;
            color: #e03131;
            font-weight: 700;
        }

        .time-val {
            font-size: 18px;
            color: #c92a2a;
            font-weight: 900;
            letter-spacing: 0.4px;
            text-align: right;
        }

        .time-box.time-box-confirmed .time-label {
            color: #2b8a3e;
        }

        .time-box.time-box-confirmed .time-val {
            color: #2f9e44;
        }

        .clearance-row {
            display: flex;
            justify-content: flex-end;
            margin-top: -4px;
            margin-bottom: 12px;
        }

        .clearance-chip {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 800;
            border: 1px solid transparent;
        }

        .clearance-chip.clearance-clean {
            background: #ebfbee;
            border-color: #c3fae8;
            color: #2b8a3e;
        }

        .clearance-chip.clearance-held {
            background: #fff4e6;
            border-color: #ffe8cc;
            color: #d9480f;
        }

        .clearance-chip.clearance-pending {
            background: #fff5f5;
            border-color: #ffe3e3;
            color: #c92a2a;
        }

        .clearance-chip.clearance-unknown {
            background: #f2f4f7;
            border-color: #d0d5dd;
            color: #475467;
        }

        .addr-box {
            position: relative;
            padding-left: 20px;
            font-size: 14px;
            border-left: 2px dotted #ddd;
            margin-left: 8px;
            margin-bottom: 14px;
        }

        .addr {
            margin-bottom: 10px;
            position: relative;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
            text-decoration: none;
            color: #444;
        }

        .addr-text {
            flex: 1;
            min-width: 0;
            line-height: 1.5;
            word-break: break-word;
        }

        .addr-trailing {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .dot {
            position: absolute;
            left: -26px;
            top: 5px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .state-label {
            float: right;
            font-size: 11px;
            background: #f0f2f5;
            padding: 1px 6px;
            border-radius: 5px;
            color: #555;
            font-weight: 600;
        }

        .nav-icon {
            font-size: 11px;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 1px 6px;
            border-radius: 5px;
        }

        .copy-btn {
            display: inline-flex;
            align-items: center;
            font-size: 11px;
            color: #344054;
            border: 1px solid #d0d5dd;
            padding: 1px 6px;
            border-radius: 5px;
            background: white;
            cursor: pointer;
        }

        .addr-locked-note {
            margin-top: -2px;
            margin-bottom: 10px;
            margin-left: 2px;
            font-size: 12px;
            color: #98a2b3;
        }

        .auth-field {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
        }

        .btn-main,
        .btn-outline,
        .btn-light {
            width: 100%;
            border: none;
            border-radius: 999px;
            font-weight: 700;
            cursor: pointer;
            font-size: 15px;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .btn-main:active,
        .btn-outline:active,
        .btn-light:active {
            transform: translateY(1px);
        }

        .btn-main {
            background: var(--primary);
            color: white;
            padding: 14px;
            margin-top: 6px;
        }

        .btn-outline {
            background: white;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 11px;
            margin-top: 8px;
        }

        .btn-light {
            background: #f2f4f7;
            color: #344054;
            padding: 12px;
            margin-top: 8px;
        }

        .mini-btn {
            border: none;
            border-radius: 999px;
            background: #eef4ff;
            color: var(--primary);
            font-size: 12px;
            font-weight: 800;
            padding: 8px 12px;
            cursor: pointer;
            white-space: nowrap;
        }

        .section-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }

        .section-row .section-title {
            margin: 0;
        }

        .compact-field {
            margin-bottom: 0;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .cargo-spec-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
        }

        .full-span {
            grid-column: 1 / -1;
        }

        textarea.auth-field {
            min-height: 96px;
            resize: vertical;
        }

        .action-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 14px;
        }

        .action-row .btn-main,
        .action-row .btn-outline,
        .action-row .btn-light {
            width: auto;
            flex: 1 1 180px;
            margin-top: 0;
        }

        .quote-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            margin: 14px 0;
        }

        .quote-card {
            background: #f8fafc;
            border: 1px solid #e4e7ec;
            border-radius: 14px;
            padding: 14px;
        }

        .quote-card .auth-field {
            margin: 10px 0 0;
        }

        .quote-card-label {
            font-size: 12px;
            color: #667085;
            font-weight: 700;
        }

        .quote-card-value {
            display: block;
            margin-top: 6px;
            font-size: 24px;
            font-weight: 900;
            color: var(--primary);
        }

        .quote-card-sub {
            display: block;
            margin-top: 6px;
            font-size: 12px;
            color: #667085;
        }

        .spec-tag-owner {
            background: #eef4ff;
            color: #175cd3;
            border-color: #dbe7ff;
        }

        .owner-meta {
            font-size: 13px;
            color: #475467;
            margin-top: 3px;
        }

        .owner-edit-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
        }

        .owner-edit-row .auth-field {
            flex: 1;
        }

        .hidden {
            display: none !important;
        }

        .section-title {
            font-size: 15px;
            font-weight: 800;
            margin: 16px 0 10px;
            color: var(--primary);
            display: flex;
            align-items: center;
        }

        .section-title::before {
            content: "";
            width: 4px;
            height: 15px;
            background: var(--primary);
            margin-right: 8px;
            border-radius: 2px;
        }

        .status-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 800;
        }

        .status-waiting {
            background: #fff7e6;
            color: #b26b00;
        }

        .status-picked {
            background: #e8f8ef;
            color: #18794e;
        }

        .status-transit {
            background: #e8f1ff;
            color: #175cd3;
        }

        .status-completed {
            background: #ebfbee;
            color: #2b8a3e;
        }

        .flow-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 14px;
        }

        .flow-step {
            padding: 10px 8px;
            border-radius: 12px;
            border: 1px solid #edf0f2;
            background: #fafbfc;
            text-align: center;
            transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }

        .flow-step strong {
            display: block;
            font-size: 12px;
        }

        .flow-step span {
            display: block;
            font-size: 11px;
            color: #8b919a;
            margin-top: 2px;
        }

        .flow-step.active {
            border-color: rgba(31, 157, 85, 0.28);
            background: rgba(31, 157, 85, 0.14);
        }

        .flow-step.done {
            border-color: rgba(31, 157, 85, 0.22);
            background: rgba(31, 157, 85, 0.08);
        }

        .flow-step.active strong,
        .flow-step.done strong {
            color: #18794e;
        }

        .flow-step.active span,
        .flow-step.done span {
            color: #2b8a3e;
        }

        .note-box {
            border-radius: 12px;
            background: #f8fafc;
            border: 1px solid #edf0f2;
            padding: 12px;
            font-size: 13px;
            color: #475467;
            margin-bottom: 12px;
        }

        .upload-title {
            font-size: 12px;
            color: #475467;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .upload-area {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }

        .upload-card {
            width: calc(50% - 5px);
        }

        .upload-btn {
            width: 100%;
            height: 92px;
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #667085;
            cursor: pointer;
            background: #fafafa;
            text-align: center;
            padding: 8px;
        }

        .file-input {
            display: none;
        }

        .preview-img {
            width: 100%;
            height: 92px;
            border-radius: 12px;
            object-fit: cover;
            display: block;
            border: 1px solid #e5e7eb;
            background: #fff;
        }

        .preview-label {
            margin-top: 6px;
            font-size: 11px;
            color: #667085;
            text-align: center;
        }

        .history-line {
            font-size: 13px;
            color: #444;
            margin-top: 2px;
        }

        .empty-card {
            text-align: center;
            padding: 28px 16px;
            color: #667085;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #f5f5f5;
            font-size: 14px;
        }

        .detail-row span:last-child {
            text-align: right;
        }

        .proof-img {
            width: 100%;
            border-radius: 12px;
            margin-top: 10px;
            border: 1px solid #ddd;
            background: #fff;
        }

        #detail-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.82);
            z-index: 2000;
            display: none;
            overflow-y: auto;
            padding: 20px;
        }

        .modal-content {
            background: white;
            border-radius: 18px;
            padding: 20px;
            max-width: 500px;
            margin: 12px auto;
            position: relative;
        }

        .modal-close {
            float: right;
            cursor: pointer;
            font-size: 24px;
            color: #344054;
        }

        @media (max-width: 540px) {
            .time-box,
            .card-header,
            .detail-row {
                flex-direction: column;
                align-items: flex-start;
            }

            .time-val,
            .detail-row span:last-child {
                text-align: left;
            }

            .stat-grid {
                grid-template-columns: 1fr;
            }

            .upload-card {
                width: 100%;
            }

            .form-grid,
            .quote-grid,
            .cargo-spec-grid {
                grid-template-columns: 1fr;
            }

            .owner-edit-row {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo" onclick="showSection('orders')">AULALA</div>
        <div class="nav-btns">
            <span id="guest-nav">
                <a href="javascript:void(0)" onclick="showSection('auth')">登录/注册</a>
                <a href="javascript:void(0)" onclick="openOwnerEntry()">货主发货</a>
            </span>
            <span id="user-nav" class="hidden">
                <a href="javascript:void(0)" id="dashboard-link" onclick="openDashboard()">个人中心</a>
                <a href="javascript:void(0)" onclick="logout()">退出</a>
            </span>
        </div>
    </header>

    <section id="filter-bar" class="filter-section">
        <div class="filter-inner">
            <input type="date" id="date-filter" class="filter-item" onchange="applyFilters()">
            <select id="state-filter" class="filter-item" onchange="applyFilters()">
                <option value="">州</option>
                <option value="NSW">NSW</option>
                <option value="VIC">VIC</option>
                <option value="QLD">QLD</option>
            </select>
            <input type="text" id="suburb-input" class="filter-item" placeholder="搜索区域 / 入仓号..." oninput="applyFilters()">
        </div>
    </section>

    <div class="container">
        <section id="order-section">
            <div class="section-row">
                <div class="section-title">抢单大厅</div>
                <button class="mini-btn" onclick="openOwnerEntry()">货主发货</button>
            </div>
            <div id="order-list"></div>
        </section>

        <section id="auth-section" class="hidden">
            <div class="card">
                <div style="display:flex; gap:10px; margin-bottom:20px;">
                    <div id="tab-login" style="flex:1; text-align:center; padding:10px; cursor:pointer; border-bottom:2px solid var(--primary);" onclick="switchAuthMode('login')">登录</div>
                    <div id="tab-reg" style="flex:1; text-align:center; padding:10px; cursor:pointer; color:#999;" onclick="switchAuthMode('reg')">注册账号</div>
                </div>

                <div id="auth-role-select" style="margin-bottom:15px; text-align:center;">
                    <label><input type="radio" name="role" value="driver" checked onclick="toggleRegForm('driver')"> 我是司机</label>
                    &nbsp;&nbsp;
                    <label><input type="radio" name="role" value="owner" onclick="toggleRegForm('owner')"> 我是货主</label>
                </div>

                <input type="tel" id="auth-phone" class="auth-field" placeholder="手机号 (测试: 13888888888)">

                <div id="driver-fields" class="hidden">
                    <input type="text" class="auth-field" placeholder="姓名">
                    <input type="text" class="auth-field" placeholder="车牌号">
                    <select class="auth-field">
                        <option>Van (面包车)</option>
                        <option>Truck (大货车)</option>
                    </select>
                </div>

                <div id="owner-fields" class="hidden">
                    <input type="text" id="owner-auth-name" class="auth-field" placeholder="公司名/个人名">
                    <input type="email" id="owner-auth-email" class="auth-field" placeholder="邮箱">
                    <input type="text" id="owner-auth-address" class="auth-field" placeholder="澳洲联系地址">
                    <div style="font-size:12px; color:var(--primary); margin-bottom:5px;">上传证明(多附件)</div>
                    <div style="border:1px dashed #ccc; padding:15px; text-align:center; background:#fafafa; font-size:12px; cursor:pointer;">点击添加附件 (营业执照等)</div>
                </div>

                <input type="password" id="auth-pass" class="auth-field" placeholder="密码 (测试: 123456)">
                <button class="btn-main" onclick="handleAuth()">提交并进入</button>
            </div>
        </section>

        <section id="user-profile" class="hidden">
            <div class="stat-grid">
                <div class="stat-card">
                    <span class="stat-val" id="total-income">$0.00</span>
                    <span class="stat-label">总收入金额</span>
                </div>
                <div class="stat-card">
                    <span class="stat-val" id="completed-count">0</span>
                    <span class="stat-label">完成订单总数</span>
                </div>
            </div>

            <div class="section-row">
                <div class="section-title" id="ongoing-title">进行中的订单 (0)</div>
                <button class="mini-btn" onclick="showSection('orders')">返回抢单大厅</button>
            </div>
            <div id="ongoing-list"></div>

            <div class="section-row">
                <div class="section-title">已完成订单</div>
                <button class="mini-btn" onclick="showSection('orders')">返回抢单大厅</button>
            </div>
            <div id="history-list"></div>
        </section>

        <section id="owner-panel" class="hidden">
            <div class="stat-grid">
                <div class="stat-card clickable" id="owner-open-card" onclick="focusOwnerOrders('published')">
                    <span class="stat-val" id="owner-open-count">0</span>
                    <span class="stat-label">待抢单货源</span>
                </div>
                <div class="stat-card clickable" id="owner-grabbed-card" onclick="focusOwnerOrders('grabbed')">
                    <span class="stat-val" id="owner-grabbed-count">0</span>
                    <span class="stat-label">已被抢单</span>
                </div>
                <div class="stat-card clickable" id="owner-completed-card" onclick="focusOwnerOrders('completed')">
                    <span class="stat-val" id="owner-completed-count">0</span>
                    <span class="stat-label">已完成货源</span>

        function saveAppState() {

        function rebuildAvailableOrders() {
            const consumedIds = new Set((state.consumedExternalOrderIds || []).map(Number));
            const activeId = state.activeOrder ? Number(state.activeOrder.id) : null;
            const ownerPublished = (state.ownerOrders || [])
                .filter(order => order.ownerLifecycleStatus === "published")
                .map((order, index) => normalizeOrder(order, 5000 + index));
            const externalAvailable = (state.baseExternalOrders || [])
                .filter(order => !consumedIds.has(Number(order.id)) && Number(order.id) !== activeId)
                .map((order, index) => normalizeOrder(order, index + 1));
            state.availableOrders = [...ownerPublished, ...externalAvailable];

        function hydrateAppState() {
            let saved = {};
            try {
                saved = JSON.parse(localStorage.getItem(APP_STORAGE_KEY) || "{}") || {};
            } catch (error) {
                saved = {};
            }

            state.loggedIn = Boolean(saved.loggedIn);
            state.userRole = saved.userRole === "owner" ? "owner" : "driver";
            state.authMode = saved.authMode === "reg" ? "reg" : "login";
            state.ownerProfile = {
                name: saved.ownerProfile?.name || "",
                phone: saved.ownerProfile?.phone || "",
                email: saved.ownerProfile?.email || "",

                ? saved.ownerOrders.map((order, index) => normalizeOrder({ ...order, source: "owner_portal" }, 8000 + index))
                : [];
            state.consumedExternalOrderIds = Array.isArray(saved.consumedExternalOrderIds)
                ? saved.consumedExternalOrderIds.map(Number)
                : [];

            rebuildAvailableOrders();
        }

        function formatCurrency(value) {
            return `$${Number(value).toFixed(2)}`;
        }

        function formatWeightLabel(weightKg) {
            const numeric = Number(weightKg || 0);
            if (!Number.isFinite(numeric) || numeric <= 0) {
                return "0kg";
            }
            return `${numeric.toFixed(2).replace(/\.00$/, "").replace(/(\.\d)0$/, "$1")}kg`;
        }

        function extractStateCode(address) {
            const match = String(address || "").match(/\b(NSW|VIC|QLD|WA|SA|TAS|ACT|NT)\b/i);
            return match ? match[1].toUpperCase() : "NSW";
        }

        function shortLocationLabel(address) {
            const parts = String(address || "")
                .split(",")
                .map(part => part.trim())
                .filter(Boolean);
            return parts[1] || parts[0] || "待分配";
        }

        function formatDateTimeForHall(value) {
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) {
                return {
                    date: "",
                    time: "--",
                    expectedPickupTime: ""
                };
            }
            const yyyy = date.getFullYear();
            const mm = String(date.getMonth() + 1).padStart(2, "0");
            const dd = String(date.getDate()).padStart(2, "0");
            const hh = String(date.getHours()).padStart(2, "0");
            const min = String(date.getMinutes()).padStart(2, "0");
            return {
                date: `${yyyy}-${mm}-${dd}`,
                time: `${dd}-${mm} ${hh}:${min}`,
                expectedPickupTime: `${yyyy}-${mm}-${dd} ${hh}:${min}`
            };
        }

        function addressKey(value) {
            return String(value || "").trim().toLowerCase().replace(/\s+/g, " ");
        }

        function candidateAddresses(value) {
            const raw = String(value || "").replace(/\n/g, ",").trim();
            if (!raw) {
                return [];
            }
            const parts = raw.split(",").map(part => part.trim()).filter(Boolean);
            const variants = [
                raw,
                parts.join(", ")
            ];
            return [...new Set(variants.map(addressKey))].map(key =>
                variants.find(item => addressKey(item) === key)
            );
        }

        async function geocodeAddress(address) {
            const candidates = candidateAddresses(address);
            if (!candidates.length) {
                throw new Error("请输入完整的地址");
            }

            for (const candidate of candidates) {
                const cacheKey = addressKey(candidate);
                if (estimateCache.geocodes[cacheKey]) {
                    return estimateCache.geocodes[cacheKey];
                }

                try {
                    const response = await fetch(`https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&q=${encodeURIComponent(candidate)}`);
                    const rows = await response.json();
                    if (Array.isArray(rows) && rows[0]) {
                        const result = {
                            address: candidate,
                            lat: Number(rows[0].lat),
                            lon: Number(rows[0].lon)
                        };
                        estimateCache.geocodes[cacheKey] = result;
                        return result;
                    }
                } catch (error) {
                    console.warn("nominatim failed", error);
                }
            }

            for (const candidate of candidates) {
                const cacheKey = addressKey(candidate);
                try {
                    const response = await fetch(`https://photon.komoot.io/api/?limit=1&q=${encodeURIComponent(candidate)}`);
                    const payload = await response.json();
                    const feature = payload?.features?.[0];
                    const coordinates = feature?.geometry?.coordinates;
                    if (Array.isArray(coordinates) && coordinates.length >= 2) {
                        const result = {
                            address: candidate,
                            lat: Number(coordinates[1]),
                            lon: Number(coordinates[0])
                        };
                        estimateCache.geocodes[cacheKey] = result;
                        return result;
                    }
                } catch (error) {
                    console.warn("photon failed", error);
                }
            }

            throw new Error("系统暂时无法识别这两个地址，请补全州和邮编后再试");
        }

        function haversineKm(lat1, lon1, lat2, lon2) {
            const toRad = value => value * Math.PI / 180;
            const earthRadius = 6371;
            const dLat = toRad(lat2 - lat1);
            const dLon = toRad(lon2 - lon1);
            const a = Math.sin(dLat / 2) ** 2
                + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
            return 2 * earthRadius * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        async function routeDistanceKm(origin, destination) {
            const routeKey = `${origin.lat.toFixed(5)},${origin.lon.toFixed(5)}|${destination.lat.toFixed(5)},${destination.lon.toFixed(5)}`;
            if (estimateCache.routes[routeKey]) {
                return estimateCache.routes[routeKey];
            }

            try {
                const response = await fetch(`https://router.project-osrm.org/route/v1/driving/${origin.lon},${origin.lat};${destination.lon},${destination.lat}?overview=false`);
                const payload = await response.json();
                const distanceKm = Number(payload?.routes?.[0]?.distance || 0) / 1000;
                if (distanceKm > 0) {
                    const result = {
                        distanceKm,
                        basis: "osrm"
                    };
                    estimateCache.routes[routeKey] = result;
                    return result;
                }
            } catch (error) {
                console.warn("osrm failed", error);
            }

            const fallbackKm = haversineKm(origin.lat, origin.lon, destination.lat, destination.lon) * 1.2;
            const result = {
                distanceKm: fallbackKm,
                basis: "haversine_x1.2"
            };
            estimateCache.routes[routeKey] = result;
            return result;
        }

        function flowClass(orderStatus, stepIndex) {
            const order = ["waiting_pickup", "picked_up", "in_transit"];
            const currentIndex = order.indexOf(orderStatus);

        function renderOrders() {
            const list = document.getElementById("order-list");
            const date = document.getElementById("date-filter").value;
            const selectedState = document.getElementById("state-filter").value;
            const searchKeyword = document.getElementById("suburb-input").value.trim().toLowerCase();

            const filtered = state.availableOrders
                .filter(order => !date || order.date === date)
                .filter(order => !selectedState || order.state === selectedState)

                    if (!searchKeyword) {
                        return true;
                    }
                    return [
                        order.orderCode,
                        order.pickup,
                        order.dropoff,
                        order.pickupAddress,
                        order.dropoffAddress
                    ]
                        .filter(Boolean)
                        .join(" ")
                        .toLowerCase()
                        .includes(searchKeyword);
                })
                .sort((a, b) => `${a.date} ${a.time}`.localeCompare(`${b.date} ${b.time}`));

            if (!filtered.length) {
                list.innerHTML = `
                    <div class="card empty-card">
                        <div style="font-size:16px; font-weight:800; color:#344054; margin-bottom:6px;">没有匹配订单</div>
                        <div>换个州、日期、区域关键词或入仓号再试试。</div>

                return;

            list.innerHTML = filtered.map(order => `
                <div class="card">
                    <div class="card-header">
                        <div>
                            ${order.orderCode ? `<div class="${orderCodeClass(order)}">${orderCodeLabel(order)}</div>` : ""}

                        <div class="addr">
                            <span class="dot" style="background:var(--success)"></span>
                            <span class="addr-text"><b>提:</b> ${pickupAddressText(order)}</span>
                            <span class="addr-trailing">
                                <span class="nav-icon">导航</span>
                            </span>
                        </div>
                        <div class="addr">
                            <span class="dot" style="background:var(--accent)"></span>
                            <span class="addr-text"><b>送:</b> ${dropoffAddressText(order)}</span>
                        </div>
                    </div>

                    ${renderOrderRemark(order)}

                    <button class="btn-main" onclick="tryAccept(${order.id})">立即抢单</button>
                </div>
            `).join("");
        }

        function ongoingDisplayStatus(order) {
            if (!order || !order.pickupPhoto) {
                return "waiting_pickup";

            if (order.deliveryPhoto || order.signaturePhoto) {
                return "in_transit";
            }
            return "picked_up";
        }

        function renderOngoingOrder(order) {
            const displayStatus = ongoingDisplayStatus(order);
            return `
                <div class="card">
                    <div class="card-header">
                        <div>
                            ${order.orderCode ? `<div class="${orderCodeClass(order)}">${orderCodeLabel(order)}</div>` : ""}

                                ${sourceChip(order)}
                                <span class="spec-tag">${order.pallets} Plt</span>

        function renderRouteBox(order) {

                <div class="addr-box">

                            <span class="nav-icon">导航</span>
                        </span>

                    ${

                                <a href="${dropoffUrl}" target="_blank" class="addr">

                                    <span class="addr-trailing">
                                        <span class="copy-btn" onclick="event.preventDefault(); event.stopPropagation(); copyAddress('${escapeForJs(dropoffAddressText(order))}', '送货地址')">复制</span>

        function escapeForJs(value) {
            return String(value)
                .replace(/\\/g, "\\\\")
                .replace(/'/g, "\\'")

        }

        function renderActionPanel(order) {
            const displayStatus = ongoingDisplayStatus(order);

            if (displayStatus === "waiting_pickup") {
                return `
                    <div class="note-box">司机抢到单后订单先变成 <b>等待提货</b>。上传提货照片后，会自动记录 <b>实际提货时间</b>，并把上传口切换到送达凭证。</div>
                    <div class="upload-title">提货现场照片</div>
                    <div class="upload-area">

                        </div>
                    </div>
                `;
            }

            if (displayStatus === "picked_up") {
                return `
                    <div class="note-box">提货时间已记录为 <b>${order.actualPickupTime || "待更新"}</b>。现在上传区已经切换为 <b>送达凭证</b>；送达照片和签字未补齐前，后续会显示为 <b>派送途中</b>。</div>
                    <div class="upload-title">送达凭证</div>
                    <div class="upload-area">
                        <div class="upload-card">
                            ${renderUploadBlock(order.deliveryPhoto, "deliveryPhoto", "上传送达照片")}
                        </div>
                        <div class="upload-card">
                            ${renderUploadBlock(order.signaturePhoto, "signaturePhoto", "上传签字照片")}

                    </div>

                <div class="note-box">提货时间已记录为 <b>${order.actualPickupTime || "待更新"}</b>。卸货完成但还没补齐送达图片和签字前，这票都保持 <b>派送途中</b>；两项都补齐后会直接进入已完成。</div>
                <div class="upload-title">送达凭证</div>
                <div class="upload-area">
                    <div class="upload-card">

        function renderUploadBlock(image, type, label) {
            if (image) {

                    <input class="file-input" id="upload-${type}" type="file" accept="image/*" capture="environment" onchange="handleProofUpload(event, '${type}')">

        function renderHistoryCard(order) {

            return `
                <div class="card">
                    <div class="card-header">
                        <div>
                            ${order.orderCode ? `<div class="${orderCodeClass(order)}">${orderCodeLabel(order)}</div>` : ""}
                            <div class="highlight-specs" style="margin-bottom:6px;">
                                ${sourceChip(order)}
                            </div>
                        </div>
                        <span class="status-chip status-completed">已完成 ${formatCurrency(order.price)}</span>
                    </div>
                    <div class="history-line">计划提货时间: ${plannedPickupTime}</div>
                    <div class="history-line">实际提货时间: ${order.actualPickupTime || "待更新"}</div>
                    <div class="history-line">实际送达时间: ${order.deliveredAt || "--"}</div>
                    <div class="history-line">提货地址: ${pickupAddressText(order)}</div>

        function ownerLifecycleMeta(status) {
            if (status === "completed") {
                return { label: "已完成", className: "status-completed" };
            }
            if (status === "grabbed") {
                return { label: "已被抢单", className: "status-transit" };
            }
            return { label: "待抢单", className: "status-waiting" };
        }

        function generateOwnerOrderCode() {
            const now = new Date();
            const yy = String(now.getFullYear()).slice(-2);
            const mm = String(now.getMonth() + 1).padStart(2, "0");
            const dd = String(now.getDate()).padStart(2, "0");
            const todayPrefix = `HZ${yy}${mm}${dd}`;
            const todayCount = state.ownerOrders.filter(order => String(order.orderCode || "").startsWith(todayPrefix)).length + 1;
            return `${todayPrefix}${String(todayCount).padStart(3, "0")}`;
        }

        function populateOwnerFormFromProfile() {
            const nameInput = document.getElementById("owner-publish-name");
            const phoneInput = document.getElementById("owner-publish-phone");
            const pickupAddressInput = document.getElementById("owner-pickup-address");
            if (nameInput && !nameInput.value.trim() && state.ownerProfile.name) {
                nameInput.value = state.ownerProfile.name;
            }
            if (phoneInput && !phoneInput.value.trim() && state.ownerProfile.phone) {
                phoneInput.value = state.ownerProfile.phone;
            }
            if (pickupAddressInput && !pickupAddressInput.value.trim() && state.ownerProfile.address) {
                pickupAddressInput.value = state.ownerProfile.address;
            }
            if (ownerEstimateFieldsReady()) {
                scheduleOwnerEstimate();
            }
        }

        function updateOwnerPricePreview() {
            const value = Number(document.getElementById("owner-price").value || 0);
            document.getElementById("owner-price-preview").textContent = value > 0 ? formatCurrency(value) : "--";
        }

        function updateOwnerEstimateDisplay(estimate) {
            const estimateVal = document.getElementById("owner-system-estimate");
            const estimateMeta = document.getElementById("owner-estimate-meta");
            estimateVal.textContent = estimate ? formatCurrency(estimate.systemEstimatedPrice) : "--";
            estimateMeta.textContent = estimate
                ? `${estimate.distanceKm.toFixed(1)} km / ${estimate.pallets} 板 / ${estimate.basis === "osrm" ? "路线里程" : "直线兜底"}`
                : "录入提货地址、目的地、重量和 CBM 后自动估价";
        }

        function resetOwnerEstimateDisplay() {
            ownerEstimateDraft = null;
            updateOwnerEstimateDisplay(null);
        }

        function ownerEstimateFieldsReady() {
            return Boolean(
                document.getElementById("owner-pickup-address")?.value.trim()
                && document.getElementById("owner-dropoff-address")?.value.trim()
                && Number(document.getElementById("owner-weight-kg")?.value || 0) > 0
                && Number(document.getElementById("owner-cbm")?.value || 0) > 0
            );
        }

        function collectOwnerFormValues({ silent = false, requireOwnerIdentity = true, requirePickupSchedule = true } = {}) {
            const payload = {
                ownerName: document.getElementById("owner-publish-name").value.trim(),
                ownerPhone: document.getElementById("owner-publish-phone").value.trim(),
                pickupAt: document.getElementById("owner-pickup-at").value,
                pickupAddress: document.getElementById("owner-pickup-address").value.trim(),
                dropoffAddress: document.getElementById("owner-dropoff-address").value.trim(),
                pieces: Number(document.getElementById("owner-pieces").value || 0),
                weightKg: Number(document.getElementById("owner-weight-kg").value || 0),
                cbm: Number(document.getElementById("owner-cbm").value || 0),
                ownerPrice: Number(document.getElementById("owner-price").value || 0),
                remarks: document.getElementById("owner-remarks").value.trim()
            };

            const missingOwnerIdentity = requireOwnerIdentity && (!payload.ownerName || !payload.ownerPhone);
            const missingPickupSchedule = requirePickupSchedule && !payload.pickupAt;
            const missingFreightFields = !payload.pickupAddress || !payload.dropoffAddress || payload.weightKg <= 0 || payload.cbm <= 0;

            if (missingOwnerIdentity || missingPickupSchedule || missingFreightFields) {
                if (!silent) {
                    alert(requireOwnerIdentity || requirePickupSchedule ? "请先录入货主名、联系电话、提货时间、提货地址、目的地、重量和 CBM。" : "请先录入提货地址、目的地、重量和 CBM。");
                }
                return null;
            }

            return payload;
        }

        async function calculateOwnerEstimate(silent = false) {
            const payload = collectOwnerFormValues({
                silent,
                requireOwnerIdentity: false,
                requirePickupSchedule: false
            });
            if (!payload) {
                return null;
            }

            const signature = ownerEstimateSignature(payload);
            if (ownerEstimateDraft && ownerEstimateDraft.signature === signature) {
                updateOwnerEstimateDisplay(ownerEstimateDraft);
                return ownerEstimateDraft;
            }

            const button = document.getElementById("owner-estimate-btn");
            if (button) {
                button.disabled = true;
                button.textContent = "重新估价中...";
            }

            try {
                const [origin, destination] = await Promise.all([
                    geocodeAddress(payload.pickupAddress),
                    geocodeAddress(payload.dropoffAddress)
                ]);
                const route = await routeDistanceKm(origin, destination);
                const pallets = Math.max(1, Math.ceil(payload.cbm / 1.5));
                ownerEstimateDraft = {
                    signature,
                    distanceKm: route.distanceKm,
                    pallets,
                    systemEstimatedPrice: Number(Math.max(80, route.distanceKm * pallets * 3).toFixed(2)),
                    basis: route.basis
                };
                updateOwnerEstimateDisplay(ownerEstimateDraft);
                if (!document.getElementById("owner-price").value.trim()) {
                    document.getElementById("owner-price").value = ownerEstimateDraft.systemEstimatedPrice.toFixed(2);
                    updateOwnerPricePreview();
                }
                return ownerEstimateDraft;
            } catch (error) {
                console.warn(error);
                if (!silent) {
                    alert(error.message || "系统估价失败，请补全地址后再试。");
                }
                return null;
            } finally {
                if (button) {
                    button.disabled = false;
                    button.textContent = "重新估价";
                }
            }
        }

        function resetOwnerForm() {
            document.getElementById("owner-pickup-at").value = "";
            document.getElementById("owner-pickup-address").value = "";
            document.getElementById("owner-dropoff-address").value = "";
            document.getElementById("owner-pieces").value = "";
            document.getElementById("owner-weight-kg").value = "";
            document.getElementById("owner-cbm").value = "";
            document.getElementById("owner-price").value = "";
            document.getElementById("owner-remarks").value = "";
            updateOwnerPricePreview();
            resetOwnerEstimateDisplay();
            populateOwnerFormFromProfile();
        }

        function scheduleOwnerEstimate() {
            if (ownerEstimateTimer) {
                clearTimeout(ownerEstimateTimer);
            }

            const payload = collectOwnerFormValues({
                silent: true,
                requireOwnerIdentity: false,
                requirePickupSchedule: false
            });
            if (!payload) {
                resetOwnerEstimateDisplay();
                return;
            }

            ownerEstimateTimer = setTimeout(() => {
                calculateOwnerEstimate(true);
            }, 450);
        }

        function bindOwnerEstimateListeners() {
            [
                "owner-pickup-address",
                "owner-dropoff-address",
                "owner-pieces",
                "owner-weight-kg",
                "owner-cbm"
            ].forEach(id => {
                const field = document.getElementById(id);
                if (!field || field.dataset.estimateBound === "yes") {
                    return;
                }
                ["input", "change", "blur"].forEach(eventName => {
                    field.addEventListener(eventName, scheduleOwnerEstimate);
                });
                field.dataset.estimateBound = "yes";
            });
        }

        async function publishOwnerOrder() {
            const payload = collectOwnerFormValues();
            if (!payload) {
                return;
            }

            const estimate = await calculateOwnerEstimate(true);
            if (!estimate) {
                alert("系统估价失败，请检查提货地址、目的地和货物参数后再发布。");
                return;
            }
            if (payload.ownerPrice <= 0) {
                alert("请输入货主报价。");
                return;
            }

            const schedule = formatDateTimeForHall(payload.pickupAt);
            const newOrder = normalizeOrder(
                {
                    id: Date.now(),
                    orderCode: generateOwnerOrderCode(),
                    price: payload.ownerPrice,
                    ownerQuotedPrice: payload.ownerPrice,
                    systemEstimatedPrice: estimate.systemEstimatedPrice,
                    source: "owner_portal",
                    sourceType: "owner_portal",
                    sourceLabel: "货主发布",
                    ownerLifecycleStatus: "published",
                    ownerName: payload.ownerName,
                    ownerPhone: payload.ownerPhone,
                    pickup: shortLocationLabel(payload.pickupAddress),
                    dropoff: shortLocationLabel(payload.dropoffAddress),
                    pickupAddress: payload.pickupAddress,
                    dropoffAddress: payload.dropoffAddress,
                    state: extractStateCode(payload.dropoffAddress),
                    pallets: estimate.pallets,
                    pieces: payload.pieces,
                    weightKg: payload.weightKg,
                    weight: formatWeightLabel(payload.weightKg),
                    cbm: payload.cbm,
                    time: schedule.time,
                    date: schedule.date,
                    expectedPickupTime: schedule.expectedPickupTime,
                    pickupTimeLabel: "提货时间",
                    pickupTimeStatus: "estimated",
                    pickupTimeColor: "red",
                    pickupTimeBasis: "owner_manual_input",
                    showClearanceSuffix: false,
                    remarks: payload.remarks,
                    createdAt: nowStamp()
                },
                Date.now()
            );

            state.ownerOrders.unshift(newOrder);
            ownerPanelFilter = "published";
            rebuildAvailableOrders();
            saveAppState();
            renderOrders();
            renderOwnerPanel();
            resetOwnerForm();
            alert("货源已进入抢单大厅。");
            showSection("owner");
        }

        function updateOwnerQuote(orderId, inputId = `owner-quote-${orderId}`, closeAfter = false) {
            const order = state.ownerOrders.find(item => item.id === orderId);
            if (!order || order.ownerLifecycleStatus !== "published") {
                alert("这票已经被抢走或已完成，不能再调价。");
                return;
            }

            const input = document.getElementById(inputId);
            const rawValue = (input?.value || "").trim();
            if (!rawValue) {
                alert("请输入新的货主报价。");
                return;
            }
            const nextPrice = Number(rawValue);
            if (nextPrice <= 0) {
                alert("请输入新的货主报价。");
                return;
            }
            if (Math.abs(nextPrice - Number(order.ownerQuotedPrice || order.price || 0)) < 0.005) {
                alert("新报价和当前报价一致，还没有更新。");
                return;
            }

            order.price = nextPrice;
            order.ownerQuotedPrice = nextPrice;
            order.quoteAdjustedAt = nowStamp();
            rebuildAvailableOrders();
            saveAppState();
            renderOrders();
            renderOwnerPanel();
            if (closeAfter) {
                closeDetail();
            }
            alert("报价已更新，抢单大厅价格也同步刷新了。");
        }

            const order = state.ownerOrders.find(item => item.id === orderId);
            if (!order) {
                return;
            }

                alert("这票已经被抢走或已完成，不能再调价。");

            document.getElementById("detail-content").innerHTML = `
                <h3 style="color:var(--primary); margin-bottom:15px; border-bottom:2px solid var(--primary); padding-bottom:10px;">调整货主报价</h3>
                <div class="detail-row"><span>货源单号</span><span>${order.orderCode}</span></div>
                <div class="detail-row"><span>货主状态</span><span>${ownerLifecycleMeta(order.ownerLifecycleStatus).label}</span></div>
                ${order.ownerName || order.ownerPhone ? `<div class="detail-row"><span>货主信息</span><span>${[order.ownerName, order.ownerPhone].filter(Boolean).join(" / ")}</span></div>` : ""}

                <div class="detail-row"><span>提货地址</span><span>${pickupAddressText(order)}</span></div>
                <div class="detail-row"><span>送货地址</span><span>${dropoffAddressText(order)}</span></div>
                <div class="detail-row"><span>货物规格</span><span>${order.pallets} Pallets / ${order.weight}${order.cbm ? ` / ${Number(order.cbm).toFixed(2)} CBM` : ""}</span></div>
                <div class="detail-row"><span>系统参考价</span><span>${formatCurrency(order.systemEstimatedPrice || 0)}</span></div>
                <div class="detail-row"><span>当前报价</span><span style="color:var(--accent); font-weight:800;">${formatCurrency(order.ownerQuotedPrice || order.price)}</span></div>
                ${order.quoteAdjustedAt ? `<div class="detail-row"><span>最后调价时间</span><span>${order.quoteAdjustedAt}</span></div>` : ""}
                ${order.remarks ? `<div class="detail-row"><span>备注要求</span><span>${order.remarks}</span></div>` : ""}
                <div style="margin-top:16px;">
                    <input id="owner-modal-quote" class="auth-field" type="number" min="0" step="0.01" placeholder="输入新价格 (AUD)">
                </div>
                <div class="action-row" style="margin-top:14px;">
                    <button class="btn-outline" onclick="closeDetail()">取消</button>
                    <button class="btn-main" onclick="updateOwnerQuote(${order.id}, 'owner-modal-quote', true)">确认更新价格</button>
                </div>
            `;

            document.getElementById("detail-modal").style.display = "block";
        }

        function ownerLifecycleRank(status) {
            const map = {
                published: 0,
                grabbed: 1,
                completed: 2
            };
            return map[status] ?? 9;
        }

        function filterOwnerOrders(status = "all") {
            const source = [...state.ownerOrders]
                .sort((a, b) => {
                    const rankDelta = ownerLifecycleRank(a.ownerLifecycleStatus) - ownerLifecycleRank(b.ownerLifecycleStatus);
                    if (rankDelta !== 0) {
                        return rankDelta;
                    }
                    return String(b.createdAt || "").localeCompare(String(a.createdAt || ""));
                });
            if (status === "all") {
                return source;
            }
            return source.filter(order => order.ownerLifecycleStatus === status);
        }

        function focusOwnerOrders(status = "all") {
            ownerPanelFilter = status;
            renderOwnerPanel();
            const matched = filterOwnerOrders(status);
            if (matched.length === 1) {
                openDetail(matched[0].id);
                return;
            }
            document.getElementById("owner-order-list")?.scrollIntoView({ behavior: "smooth", block: "start" });
        }

        function renderOwnerOrderCard(order) {
            const meta = ownerLifecycleMeta(order.ownerLifecycleStatus);
            return `
                <div class="card">
                    <div class="card-header">
                        <div>
                            <div class="order-code">${order.orderCode}</div>
                            <div class="highlight-specs">
                                <span class="spec-tag spec-tag-owner">货主发布</span>
                                <span class="spec-tag">${order.pallets} Plt</span>
                                <span class="spec-tag">${order.weight}</span>
                                ${order.cbm ? `<span class="spec-tag">${Number(order.cbm).toFixed(2)} CBM</span>` : ""}
                            </div>
                        </div>
                        <span class="status-chip ${meta.className}">${meta.label}</span>
                    </div>
                    ${order.ownerName || order.ownerPhone ? `<div class="history-line">货主信息: ${[order.ownerName, order.ownerPhone].filter(Boolean).join(" / ")}</div>` : ""}
                    <div class="history-line">提货时间: ${order.expectedPickupTime || "--"}</div>
                    <div class="history-line">提货地址: ${pickupAddressText(order)}</div>
                    <div class="history-line">送货地址: ${dropoffAddressText(order)}</div>
                    <div class="history-line">系统参考价: ${formatCurrency(order.systemEstimatedPrice || 0)}</div>
                    <div class="history-line">货主当前报价: ${formatCurrency(order.ownerQuotedPrice || order.price)}</div>
                    ${order.createdAt ? `<div class="owner-meta">发布时间: ${order.createdAt}</div>` : ""}
                    ${order.quoteAdjustedAt ? `<div class="owner-meta">最后调价: ${order.quoteAdjustedAt}</div>` : ""}
                    ${order.driverAcceptedAt ? `<div class="owner-meta">被抢单时间: ${order.driverAcceptedAt}</div>` : ""}
                    ${order.deliveredAt ? `<div class="owner-meta">完成时间: ${order.deliveredAt}</div>` : ""}
                    ${order.remarks ? `<div class="note-box" style="margin-top:12px;"><b>备注要求：</b>${order.remarks}</div>` : ""}
                    <button class="btn-outline" style="margin-top:12px;" onclick="openDetail(${order.id})">查看详情</button>
                    ${
                        order.ownerLifecycleStatus === "published"
                            ? `
                                <button class="btn-outline" style="margin-top:10px;" onclick="openOwnerQuoteModal(${order.id})">调整价格</button>
                            `
                            : ""
                    }
                </div>
            `;
        }

        function renderOwnerPanel() {
            const openCount = state.ownerOrders.filter(order => order.ownerLifecycleStatus === "published").length;
            const grabbedCount = state.ownerOrders.filter(order => order.ownerLifecycleStatus === "grabbed").length;
            const completedCount = state.ownerOrders.filter(order => order.ownerLifecycleStatus === "completed").length;
            document.getElementById("owner-open-count").textContent = String(openCount);
            document.getElementById("owner-grabbed-count").textContent = String(grabbedCount);
            document.getElementById("owner-completed-count").textContent = String(completedCount);
            document.getElementById("owner-open-card").classList.toggle("active", ownerPanelFilter === "published");
            document.getElementById("owner-grabbed-card").classList.toggle("active", ownerPanelFilter === "grabbed");
            document.getElementById("owner-completed-card").classList.toggle("active", ownerPanelFilter === "completed");

            const list = document.getElementById("owner-order-list");
            if (!state.ownerOrders.length) {
                list.innerHTML = `
                    <div class="card empty-card">
                        <div style="font-size:16px; font-weight:800; color:#344054; margin-bottom:6px;">还没有录入货源</div>
                        <div>上面录入一票货源后，它会立即进入抢单大厅，同时在这里持续跟踪是否被抢单。</div>
                    </div>
                `;
                return;
            }

            const filteredOrders = filterOwnerOrders(ownerPanelFilter);
            if (!filteredOrders.length) {
                list.innerHTML = `
                    <div class="card empty-card">
                        <div style="font-size:16px; font-weight:800; color:#344054; margin-bottom:6px;">当前筛选没有订单</div>
                        <div>换一个统计卡片，或者继续发布新货源。</div>
                    </div>
                `;
                return;
            }

            list.innerHTML = filteredOrders.map(renderOwnerOrderCard).join("");
        }

        function renderProfile() {
            const ongoingList = document.getElementById("ongoing-list");
            const historyList = document.getElementById("history-list");
            const completedIncome = state.completedOrders.reduce((sum, order) => sum + Number(order.price), 0);

            document.getElementById("completed-count").textContent = String(state.completedOrders.length);
            document.getElementById("total-income").textContent = formatCurrency(completedIncome);
            document.getElementById("ongoing-title").textContent = `进行中的订单 (${state.activeOrder ? 1 : 0})`;

            ongoingList.innerHTML = state.activeOrder
                ? renderOngoingOrder(state.activeOrder)
                : `
                    <div class="card empty-card">
                        <div style="font-size:16px; font-weight:800; color:#344054; margin-bottom:6px;">当前没有进行中的订单</div>
                        <div>回抢单大厅接新单后，司机流程会从“等待提货”开始。</div>
                    </div>
                `;

            historyList.innerHTML = state.completedOrders.length
                ? state.completedOrders.map(renderHistoryCard).join("")
                : `
                    <div class="card empty-card">
                        <div style="font-size:16px; font-weight:800; color:#344054; margin-bottom:6px;">还没有已完成订单</div>
                        <div>上传送达图片并签字后，这里会自动新增记录。</div>
                    </div>
                `;
        }

        function getSelectedAuthRole() {
            return document.querySelector('input[name="role"]:checked')?.value || "driver";
        }

        function updateNavigation() {
            document.getElementById("guest-nav").classList.toggle("hidden", state.loggedIn);
            document.getElementById("user-nav").classList.toggle("hidden", !state.loggedIn);
            document.getElementById("dashboard-link").textContent = state.userRole === "owner" ? "货主后台" : "个人中心";
        }

        function openDashboard() {
            if (state.userRole === "owner") {
                renderOwnerPanel();
                scheduleOwnerEstimate();
                showSection("owner");
                return;
            }
            renderProfile();
            showSection("profile");
        }

        function openOwnerEntry() {
            if (state.loggedIn && state.userRole === "owner") {
                openDashboard();
                return;
            }
            const ownerRadio = document.querySelector('input[name="role"][value="owner"]');
            if (ownerRadio) {
                ownerRadio.checked = true;
            }
            switchAuthMode("reg");
            toggleRegForm("owner");
            showSection("auth");
        }

        function switchAuthMode(mode) {
            state.authMode = mode === "reg" ? "reg" : "login";
            const isReg = state.authMode === "reg";
            document.getElementById("tab-login").style.color = isReg ? "#999" : "#002b7f";
            document.getElementById("tab-login").style.borderBottom = isReg ? "none" : "2px solid #002b7f";
            document.getElementById("tab-reg").style.color = isReg ? "#002b7f" : "#999";
            document.getElementById("tab-reg").style.borderBottom = isReg ? "2px solid #002b7f" : "none";
            toggleRegForm(getSelectedAuthRole());
            saveAppState();
        }

        function toggleRegForm(role) {
            const showExtra = state.authMode === "reg";
            document.getElementById("driver-fields").classList.toggle("hidden", !showExtra || role !== "driver");
            document.getElementById("owner-fields").classList.toggle("hidden", !showExtra || role !== "owner");
        }

        function showSection(section) {
            document.getElementById("order-section").style.display = section === "orders" ? "block" : "none";
            document.getElementById("filter-bar").style.display = section === "orders" ? "block" : "none";
            document.getElementById("auth-section").classList.toggle("hidden", section !== "auth");
            document.getElementById("user-profile").classList.toggle("hidden", section !== "profile");
            document.getElementById("owner-panel").classList.toggle("hidden", section !== "owner");
            window.scrollTo(0, 0);
        }

        function handleAuth() {
            const phone = document.getElementById("auth-phone").value.trim();
            const pass = document.getElementById("auth-pass").value.trim();
            const role = getSelectedAuthRole();
            if (!phone || !pass) {
                alert("请输入手机号和密码。");
                return;
            }

            state.loggedIn = true;
            state.userRole = role;
            state.ownerProfile = {
                name: (document.getElementById("owner-auth-name")?.value || "").trim() || state.ownerProfile.name || "",
                phone,
                email: (document.getElementById("owner-auth-email")?.value || "").trim() || state.ownerProfile.email || "",
                address: (document.getElementById("owner-auth-address")?.value || "").trim() || state.ownerProfile.address || ""
            };

            updateNavigation();
            populateOwnerFormFromProfile();
            saveAppState();

            if (role === "owner") {
                renderOwnerPanel();
                scheduleOwnerEstimate();
                showSection("owner");
                return;
            }

            renderProfile();
            showSection("profile");
        }

        function logout() {
            state.loggedIn = false;
            state.userRole = "driver";
            saveAppState();
            location.reload();
        }

        function tryAccept(orderId) {
            if (!state.loggedIn) {
                alert("请先以司机身份登录，再去抢单。");
                showSection("auth");
                return;
            }

            if (state.userRole !== "driver") {
                alert("当前登录的是货主账号，请切换司机身份后再抢单。");
                return;
            }

            if (state.activeOrder) {
                alert("当前已有进行中的订单，请先完成后再抢下一单。");
                showSection("profile");
                return;
            }

            const order = state.availableOrders.find(item => item.id === orderId);
            if (!order) {
                return;
            }

            if (!confirm("确认抢单吗？")) {
                return;
            }

            if (order.sourceType === "owner_portal") {
                const ownerOrder = state.ownerOrders.find(item => item.id === order.id);
                if (ownerOrder) {
                    ownerOrder.ownerLifecycleStatus = "grabbed";
                    ownerOrder.driverAcceptedAt = nowStamp();
                }
            } else if (!state.consumedExternalOrderIds.includes(order.id)) {
                state.consumedExternalOrderIds.push(order.id);
            }

            state.activeOrder = normalizeOrder(
                {
                    ...order,
                    ownerLifecycleStatus: order.sourceType === "owner_portal" ? "grabbed" : order.ownerLifecycleStatus,
                    status: "waiting_pickup",
                    scheduledPickupTime: order.time,
                    scheduledPickupLabel: order.pickupTimeLabel || "预计提货时间",
                    actualPickupTime: "",
                    deliveredAt: "",
                    pickupPhoto: "",
                    deliveryPhoto: "",
                    signaturePhoto: ""
                },
                order.id
            );

            rebuildAvailableOrders();
            saveAppState();
            renderOrders();
            renderProfile();
            renderOwnerPanel();
            alert(order.sourceType === "owner_portal" ? "抢单成功，货主后台已同步显示“已被抢单”。" : "抢单成功，订单已进入“等待提货”。");
            showSection("profile");
        }

        function openUpload(type) {
            const input = document.getElementById(`upload-${type}`);
            if (input) {
                input.click();
            }
        }

        function handleProofUpload(event, type) {
            if (!state.activeOrder) {
                return;
            }

            const file = event.target.files && event.target.files[0];
            if (!file) {
                return;
            }

            const reader = new FileReader();
            reader.onload = () => {
                state.activeOrder[type] = reader.result;

                if (type === "pickupPhoto") {
                    if (!state.activeOrder.actualPickupTime) {
                        state.activeOrder.actualPickupTime = nowStamp();
                    }
                    state.activeOrder.status = "picked_up";
                    saveAppState();
                    renderProfile();
                    renderOwnerPanel();
                    return;
                }

                if (type === "deliveryPhoto" && !state.activeOrder.deliveredAt) {
                    state.activeOrder.deliveredAt = nowStamp();
                }

                if (state.activeOrder.deliveryPhoto && state.activeOrder.signaturePhoto) {
                    completeOrder();
                    return;
                }

                state.activeOrder.status = "in_transit";
                saveAppState();
                renderProfile();
                renderOwnerPanel();
            };
            reader.readAsDataURL(file);
        }

        function completeOrder() {
            if (!state.activeOrder) {
                return;
            }

            if (!state.activeOrder.deliveryPhoto || !state.activeOrder.signaturePhoto) {
                alert("请先上传送达照片和签字图片。");
                return;
            }

            const finished = {
                ...state.activeOrder,
                status: "completed",
                deliveredAt: state.activeOrder.deliveredAt || nowStamp()
            };

            if (finished.sourceType === "owner_portal") {
                const ownerOrder = state.ownerOrders.find(item => item.id === finished.id);
                if (ownerOrder) {
                    Object.assign(ownerOrder, finished, {
                        ownerLifecycleStatus: "completed"
                    });
                }
            }

            state.completedOrders.unshift(normalizeOrder(finished, finished.id));
            state.activeOrder = null;
            rebuildAvailableOrders();
            saveAppState();
            renderProfile();
            renderOwnerPanel();
            alert("订单已完成，已进入“已完成订单”。");
        }

        async function copyAddress(text, label) {
            try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    await navigator.clipboard.writeText(text);
                } else {
                    const input = document.createElement("textarea");
                    input.value = text;
                    document.body.appendChild(input);
                    input.select();
                    document.execCommand("copy");
                    document.body.removeChild(input);
                }
                alert(`${label}已复制`);
            } catch (error) {
                alert(`复制失败，请手动复制：${text}`);
            }
        }

        function findOrderById(orderId) {
            const numericId = Number(orderId);
            if (state.activeOrder && Number(state.activeOrder.id) === numericId) {
                return state.activeOrder;
            }
            return state.ownerOrders.find(item => Number(item.id) === numericId)
                || state.completedOrders.find(item => Number(item.id) === numericId)
                || state.availableOrders.find(item => Number(item.id) === numericId)
                || null;
        }

        function openDetail(orderId) {
            const order = findOrderById(orderId);
            if (!order) {
                return;
            }

            const isOwnerOrder = order.sourceType === "owner_portal";
            const ownerStatus = ownerLifecycleMeta(order.ownerLifecycleStatus || "published");
            const detailTitle = isOwnerOrder ? "货主订单详情" : "历史订单详情";
            const priceLabel = isOwnerOrder ? "货主报价" : "结算运费";
            const plannedPickupTime = order.scheduledPickupTime || order.time || "--";
            const proofBlocks = [
                ["提货照片", order.pickupPhoto, "提货照片"],
                ["送达照片", order.deliveryPhoto, "送达照片"],
                ["客户签字", order.signaturePhoto, "客户签字"]
            ].map(([label, src, alt]) => `
                <p style="font-size:13px; font-weight:800; margin-top:${label === "提货照片" ? "0" : "12px"};">${label}：</p>
                ${src ? `<img class="proof-img" src="${src}" alt="${alt}">` : `<div class="note-box">暂未上传</div>`}
            `).join("");

            document.getElementById("detail-content").innerHTML = `
                <h3 style="color:var(--primary); margin-bottom:15px; border-bottom:2px solid var(--primary); padding-bottom:10px;">${detailTitle}</h3>
                ${order.orderCode ? `<div class="detail-row"><span>入仓号</span><span>${orderCodeLabel(order)}</span></div>` : ""}
                ${isOwnerOrder ? `<div class="detail-row"><span>货主状态</span><span>${ownerStatus.label}</span></div>` : ""}
                <div class="detail-row"><span>${priceLabel}</span><span style="color:var(--accent); font-weight:800;">${formatCurrency(order.price)}</span></div>
                ${isOwnerOrder ? `<div class="detail-row"><span>系统参考价</span><span>${formatCurrency(order.systemEstimatedPrice || 0)}</span></div>` : ""}
                ${isOwnerOrder && (order.ownerName || order.ownerPhone) ? `<div class="detail-row"><span>货主信息</span><span>${[order.ownerName, order.ownerPhone].filter(Boolean).join(" / ")}</span></div>` : ""}
                <div class="detail-row"><span>计划提货时间</span><span>${plannedPickupTime}</span></div>
                <div class="detail-row"><span>实际提货时间</span><span>${order.actualPickupTime || "待更新"}</span></div>
                <div class="detail-row"><span>实际送达时间</span><span>${order.deliveredAt || "--"}</span></div>
                ${order.showClearanceSuffix !== false ? `<div class="detail-row"><span>清关状态</span><span>${order.clearanceStatusLabel || clearanceStatusText(order.clearanceStatus)}</span></div>` : ""}
                <div class="detail-row"><span>提货地点</span><span>${order.pickupAddress}</span></div>
                <div class="detail-row"><span>送达地点</span><span>${order.dropoffAddress}</span></div>
                <div class="detail-row"><span>货物规格</span><span>${order.pallets} Pallets / ${order.weight}</span></div>
                ${order.quoteAdjustedAt ? `<div class="detail-row"><span>最后调价时间</span><span>${order.quoteAdjustedAt}</span></div>` : ""}
                ${order.driverAcceptedAt ? `<div class="detail-row"><span>被抢单时间</span><span>${order.driverAcceptedAt}</span></div>` : ""}
                ${order.remarks ? `<div class="detail-row"><span>备注要求</span><span>${order.remarks}</span></div>` : ""}
                <div style="margin-top:15px;">
                    ${proofBlocks}
                </div>
                <button class="btn-main" onclick="closeDetail()">关闭</button>
            `;

            document.getElementById("detail-modal").style.display = "block";
        }

        function closeDetail() {
            document.getElementById("detail-modal").style.display = "none";
        }

        function applyFilters() {
            renderOrders();
        }

        document.getElementById("detail-modal").addEventListener("click", event => {
            if (event.target.id === "detail-modal") {
                closeDetail();
            }
        });

        window.onload = () => {
            hydrateAppState();
            updateNavigation();
            bindOwnerEstimateListeners();
            populateOwnerFormFromProfile();
            updateOwnerPricePreview();
            document.getElementById("owner-price")?.addEventListener("input", updateOwnerPricePreview);
            scheduleOwnerEstimate();
            renderOrders();
            renderProfile();
            renderOwnerPanel();
            if (state.userRole === "owner") {
                const ownerRadio = document.querySelector('input[name="role"][value="owner"]');
                if (ownerRadio) {
                    ownerRadio.checked = true;
                }
            }
            switchAuthMode(state.authMode || "login");
            if (state.loggedIn) {
                openDashboard();
            } else {
                showSection("orders");
            }
        };
    </script>
</body>
</html>
