<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aulala | 澳洲货运中心</title>
    <style>
        :root { --primary: #002b7f; --accent: #e63946; --bg: #f4f7f9; --border: #e0e0e0; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: #1a1b1e; line-height: 1.5; }
        
        /* 导航栏 */
        header { 
            background: var(--primary); color: white; padding: 12px 15px; 
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .logo { font-weight: 800; font-size: 18px; letter-spacing: 0.5px; }
        .nav-btns a { color: white; text-decoration: none; font-size: 12px; margin-left: 5px; border: 1px solid rgba(255,255,255,0.3); padding: 4px 10px; border-radius: 15px; }

        /* 优化后的搜索条：时间 > 州 > 区 */
        .filter-section {
            background: white; padding: 10px; display: flex; align-items: center; gap: 8px;
            position: sticky; top: 49px; z-index: 999; border-bottom: 1px solid #eee;
        }
        .filter-item {
            height: 38px; border: 1px solid var(--border); border-radius: 6px; 
            font-size: 13px; outline: none; background: white; color: #333;
            display: flex; align-items: center;
        }
        /* 比例分配 */
        #date-filter { width: 28%; padding: 0 5px; } /* 提货时间 */
        #state-filter { width: 20%; padding: 0 5px; background-color: #f9f9f9; } /* 州 */
        #suburb-input { flex-grow: 1; padding: 0 12px; width: 45%; } /* 区域 - 稍微放大且更显眼 */
        
        input::placeholder { color: #aaa; }

        .container { padding: 12px; max-width: 600px; margin: 0 auto; }

        /* 订单卡片 */
        .order-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.03); border: 1px solid #f0f0f0; }
        .order-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .tag { background: #fff9db; color: #f08c00; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; border: 1px solid #ffe066; }
        .price { color: var(--accent); font-size: 22px; font-weight: 800; }
        .specs { display: flex; background: #f8f9fa; padding: 8px; border-radius: 6px; margin-bottom: 12px; font-size: 12px; justify-content: space-between; }
        .addr-box { position: relative; padding-left: 20px; font-size: 14px; border-left: 2px dotted #ddd; margin-left: 8px; }
        .addr { margin-bottom: 8px; position: relative; }
        .dot { position: absolute; left: -26px; top: 5px; width: 10px; height: 10px; border-radius: 50%; }
        .btn-main { width: 100%; background: var(--primary); color: white; border: none; padding: 13px; border-radius: 25px; font-weight: bold; cursor: pointer; margin-top: 5px; font-size: 15px; }

        /* 后台中心 */
        #user-profile { display: none; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-card { background: white; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #eee; }
        .stat-val { display: block; font-size: 22px; font-weight: 800; color: var(--primary); }
        .stat-label { font-size: 12px; color: #888; }
        .info-list { background: white; border-radius: 12px; padding: 5px 15px; border: 1px solid #eee; }
        .info-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f4f4f4; font-size: 14px; }
        .info-item:last-child { border: none; }
        .info-label { color: #888; }

        /* 登录注册 */
        #auth-section { display: none; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-top: 10px; }
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #eee; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; color: #888; font-weight: bold; }
        .tab.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
        .auth-field { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .group-title { font-size: 11px; color: var(--primary); margin: 5px 0 8px; font-weight: bold; opacity: 0.8; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="showSection('orders')">AULALA</div>
        <div class="nav-btns">
            <span id="guest-nav">
                <a href="javascript:void(0)" onclick="showSection('auth', 'reg')">注册</a>
                <a href="javascript:void(0)" onclick="showSection('auth', 'login')">登录</a>
            </span>
            <span id="user-nav" class="hidden">
                <a href="javascript:void(0)" onclick="showSection('profile')">我的后台</a>
                <a href="javascript:void(0)" onclick="logout()">退出</a>
            </span>
        </div>
    </header>

    <section id="filter-bar" class="filter-section">
        <input type="date" id="date-filter" class="filter-item" onchange="applyFilters()" title="提货时间">
        <select id="state-filter" class="filter-item" onchange="applyFilters()">
            <option value="">所有州</option>
            <option value="NSW">NSW</option>
            <option value="VIC">VIC</option>
            <option value="QLD">QLD</option>
            <option value="WA">WA</option>
        </select>
        <input type="text" id="suburb-input" class="filter-item" placeholder="搜索区域 (Suburb)..." oninput="applyFilters()">
    </section>

    <div class="container">
        <section id="order-section">
            <div id="order-list"></div>
        </section>

        <section id="auth-section">
            <div class="tabs">
                <div id="tab-login" class="tab active" onclick="switchAuthMode('login')">司机登录</div>
                <div id="tab-reg" class="tab" onclick="switchAuthMode('reg')">申请加入</div>
            </div>
            <input type="tel" class="auth-field" placeholder="手机号 (Mobile)">
            <div id="reg-fields" class="hidden">
                <input type="text" class="auth-field" placeholder="姓名">
                <div class="group-title">车辆信息</div>
                <input type="text" class="auth-field" placeholder="车牌号 (License Plate)">
                <select class="auth-field">
                    <option>SUV / Car</option>
                    <option>Van (面包车)</option>
                    <option>Truck (货车)</option>
                </select>
                <div class="group-title">结算银行卡 (用于运费发放)</div>
                <input type="text" class="auth-field" placeholder="BSB (6位)">
                <input type="text" class="auth-field" placeholder="Account Number">
            </div>
            <input type="password" class="auth-field" placeholder="登录密码">
            <button class="btn-main" onclick="handleLogin()">确认进入</button>
        </section>

        <section id="user-profile">
            <div class="stat-grid">
                <div class="stat-card"><span class="stat-val">$0.00</span><span class="stat-label">待结算运费</span></div>
                <div class="stat-card"><span class="stat-val">0</span><span class="stat-label">今日接单</span></div>
            </div>
            <div class="info-list">
                <div class="group-title" style="padding-top:10px">我的基本资料</div>
                <div class="info-item"><span class="info-label">认证状态</span><span style="color:#28a745;font-weight:bold">已认证司机</span></div>
                <div class="info-item"><span class="info-label">注册电话</span><span>未登录</span></div>
                <div class="info-item"><span class="info-label">我的车型</span><span>SUV / Car</span></div>
                <div class="info-item"><span class="info-label">账户余额</span><span>$0.00</span></div>
            </div>
            <button class="btn-main" style="background:#666" onclick="showSection('orders')">返回抢单厅</button>
        </section>
    </div>

    <script>
        // 模拟数据
        const mockData = [
            { id: 101, price: 68.0, state: 'NSW', pickup: 'Regents Park', dropoff: 'Sydney CBD', type: 'VAN', time: '2026-03-24 14:00' },
            { id: 102, price: 115.0, state: 'VIC', pickup: 'Clayton', dropoff: 'Melbourne CBD', type: 'Truck', time: '2026-03-24 16:30' },
            { id: 103, price: 45.0, state: 'NSW', pickup: 'Hurstville', dropoff: 'Burwood', type: 'SUV', time: '2026-03-25 09:00' },
            { id: 104, price: 95.0, state: 'QLD', pickup: 'Sunnybank', dropoff: 'Brisbane City', type: 'VAN', time: '2026-03-24 10:00' }
        ];

        // 格式化显示时间: DD-MM HH:mm
        function formatTime(str) {
            const parts = str.split(' ');
            const dateParts = parts[0].split('-');
            return `${dateParts[2]}-${dateParts[1]} ${parts[1]}`;
        }

        function renderOrders(data) {
            const list = document.getElementById('order-list');
            // 按时间升序排序
            const sorted = data.sort((a,b) => new Date(a.time) - new Date(b.time));
            
            list.innerHTML = sorted.length ? sorted.map(o => `
                <div class="order-card">
                    <div class="order-header"><span class="tag">${o.type}</span><span class="price">$${o.price.toFixed(2)}</span></div>
                    <div class="specs">
                        <span>提货时间: <b style="color:var(--accent)">${formatTime(o.time)}</b></span>
                        <span>联盟直派货源</span>
                    </div>
                    <div class="addr-box">
                        <div class="addr"><span class="dot" style="background:#28a745"></span><b>提:</b> ${o.pickup}, ${o.state}</div>
                        <div class="addr"><span class="dot" style="background:var(--accent)"></span><b>送:</b> ${o.dropoff}, ${o.state}</div>
                    </div>
                    <button class="btn-main" onclick="tryAccept()">立即抢单</button>
                </div>
            `).join('') : '<div style="text-align:center;padding:50px;color:#999;font-size:14px;">没有找到符合条件的货源</div>';
        }

        function applyFilters() {
            const d = document.getElementById('date-filter').value;
            const s = document.getElementById('state-filter').value;
            const sub = document.getElementById('suburb-input').value.toLowerCase();
            
            const filtered = mockData.filter(o => 
                (!d || o.time.includes(d)) && (!s || o.state === s) && (!sub || o.pickup.toLowerCase().includes(sub))
            );
            renderOrders(filtered);
        }

        function showSection(sec, mode) {
            document.getElementById('order-section').style.display = (sec === 'orders') ? 'block' : 'none';
            document.getElementById('filter-bar').style.display = (sec === 'orders') ? 'flex' : 'none';
            document.getElementById('auth-section').style.display = (sec === 'auth') ? 'block' : 'none';
            document.getElementById('user-profile').style.display = (sec === 'profile') ? 'block' : 'none';
            if(mode) switchAuthMode(mode);
            window.scrollTo(0,0);
        }

        function switchAuthMode(m) {
            const isReg = m === 'reg';
            document.getElementById('reg-fields').className = isReg ? '' : 'hidden';
            document.getElementById('tab-login').className = isReg ? 'tab' : 'tab active';
            document.getElementById('tab-reg').className = isReg ? 'tab active' : 'tab';
        }

        function handleLogin() {
            // 对接 ERP 121.196.233.99 的逻辑预留
            document.getElementById('guest-nav').className = 'hidden';
            document.getElementById('user-nav').className = '';
            showSection('orders');
        }

        function logout() {
            document.getElementById('guest-nav').className = '';
            document.getElementById('user-nav').className = 'hidden';
            showSection('orders');
        }

        function tryAccept() { alert("账户待审核中，请联系客服加速审核！"); }

        window.onload = () => renderOrders(mockData);
    </script>
</body>
</html>
