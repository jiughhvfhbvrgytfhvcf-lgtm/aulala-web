<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aulala | 澳洲货运抢单中心</title>
    <style>
        :root {
            --primary: #002b7f;
            --accent: #e63946;
            --bg: #f4f7f9;
            --border: #e0e0e0;
            --success: #1f9d55;
            --gold: #f08c00;
            --warning: #f59f00;
            --info: #1c7ed6;
            --muted: #667085;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: #1a1b1e;
            line-height: 1.5;
        }

        header {
            background: var(--primary);
            color: white;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
        }

        .logo {
            font-weight: 800;
            font-size: 18px;
            letter-spacing: 0.5px;
            cursor: pointer;
        }

        .nav-btns {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-btns a {
            color: white;
            text-decoration: none;
            font-size: 12px;
            border: 1px solid rgba(255, 255, 255, 0.35);
            padding: 5px 10px;
            border-radius: 16px;
        }

        .filter-section {
            background: white;
            position: sticky;
            top: 49px;
            z-index: 999;
            border-bottom: 1px solid #ebedf0;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.04);
        }

        .filter-inner {
            max-width: 624px;
            margin: 0 auto;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-item {
            height: 40px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 13px;
            outline: none;
            background: white;
            min-width: 0;
        }

        #date-filter {
            flex: 1.25;
            padding: 0 8px;
        }

        #state-filter {
            flex: 0.95;
            padding: 0 8px;
            background: #fafafa;
        }

        #suburb-input {
            flex: 1.8;
            padding: 0 12px;
        }

        .container {
            padding: 12px;
            max-width: 624px;
            margin: 0 auto;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: white;
            padding: 15px;
            border-radius: 14px;
            text-align: center;
            border: 1px solid #edf0f2;
            box-shadow: 0 5px 14px rgba(15, 23, 42, 0.04);
        }

        .stat-val {
            display: block;
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
        }

        .stat-label {
            font-size: 12px;
            color: #7a7f87;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid #edf0f2;
            box-shadow: 0 8px 22px rgba(15, 23, 42, 0.06);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px dashed #ebedf0;
        }

        .order-code {
            font-size: 12px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 8px;
            letter-spacing: 0.2px;
        }

        .highlight-specs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .spec-tag {
            background: #fff4e6;
            color: var(--gold);
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 800;
            border: 1px solid #ffe8cc;
        }

        .price {
            color: var(--accent);
            font-size: 22px;
            font-weight: 900;
            white-space: nowrap;
        }

        .time-box {
            background: #fff5f5;
            border: 1px solid #ffe3e3;
            padding: 10px 12px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .time-label {
            font-size: 12px;
            color: #e03131;
            font-weight: 700;
        }

        .time-val {
            font-size: 18px;
            color: #c92a2a;
            font-weight: 900;
            letter-spacing: 0.4px;
            text-align: right;
        }

        .addr-box {
            position: relative;
            padding-left: 20px;
            font-size: 14px;
            border-left: 2px dotted #ddd;
            margin-left: 8px;
            margin-bottom: 14px;
        }

        .addr {
            margin-bottom: 10px;
            position: relative;
            display: block;
            text-decoration: none;
            color: #444;
        }

        .addr-trailing {
            float: right;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .dot {
            position: absolute;
            left: -26px;
            top: 5px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .state-label {
            float: right;
            font-size: 11px;
            background: #f0f2f5;
            padding: 1px 6px;
            border-radius: 5px;
            color: #555;
            font-weight: 600;
        }

        .nav-icon {
            font-size: 11px;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 1px 6px;
            border-radius: 5px;
        }

        .copy-btn {
            display: inline-flex;
            align-items: center;
            font-size: 11px;
            color: #344054;
            border: 1px solid #d0d5dd;
            padding: 1px 6px;
            border-radius: 5px;
            background: white;
            cursor: pointer;
        }

        .addr-locked-note {
            margin-top: -2px;
            margin-bottom: 10px;
            margin-left: 2px;
            font-size: 12px;
            color: #98a2b3;
        }

        .auth-field {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
        }

        .btn-main,
        .btn-outline,
        .btn-light {
            width: 100%;
            border: none;
            border-radius: 999px;
            font-weight: 700;
            cursor: pointer;
            font-size: 15px;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .btn-main:active,
        .btn-outline:active,
        .btn-light:active {
            transform: translateY(1px);
        }

        .btn-main {
            background: var(--primary);
            color: white;
            padding: 14px;
            margin-top: 6px;
        }

        .btn-outline {
            background: white;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 11px;
            margin-top: 8px;
        }

        .btn-light {
            background: #f2f4f7;
            color: #344054;
            padding: 12px;
            margin-top: 8px;
        }

        .hidden {
            display: none !important;
        }

        .section-title {
            font-size: 15px;
            font-weight: 800;
            margin: 16px 0 10px;
            color: var(--primary);
            display: flex;
            align-items: center;
        }

        .section-title::before {
            content: "";
            width: 4px;
            height: 15px;
            background: var(--primary);
            margin-right: 8px;
            border-radius: 2px;
        }

        .status-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 800;
        }

        .status-waiting {
            background: #fff7e6;
            color: #b26b00;
        }

        .status-picked {
            background: #e8f8ef;
            color: #18794e;
        }

        .status-transit {
            background: #e8f1ff;
            color: #175cd3;
        }

        .status-completed {
            background: #ebfbee;
            color: #2b8a3e;
        }

        .flow-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 14px;
        }

        .flow-step {
            padding: 10px 8px;
            border-radius: 12px;
            border: 1px solid #edf0f2;
            background: #fafbfc;
            text-align: center;
            transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }

        .flow-step strong {
            display: block;
            font-size: 12px;
        }

        .flow-step span {
            display: block;
            font-size: 11px;
            color: #8b919a;
            margin-top: 2px;
        }

        .flow-step.active {
            border-color: rgba(31, 157, 85, 0.28);
            background: rgba(31, 157, 85, 0.14);
        }

        .flow-step.done {
            border-color: rgba(31, 157, 85, 0.22);
            background: rgba(31, 157, 85, 0.08);
        }

        .flow-step.active strong,
        .flow-step.done strong {
            color: #18794e;
        }

        .flow-step.active span,
        .flow-step.done span {
            color: #2b8a3e;
        }

        .note-box {
            border-radius: 12px;
            background: #f8fafc;
            border: 1px solid #edf0f2;
            padding: 12px;
            font-size: 13px;
            color: #475467;
            margin-bottom: 12px;
        }

        .upload-title {
            font-size: 12px;
            color: #475467;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .upload-area {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }

        .upload-card {
            width: calc(50% - 5px);
        }

        .upload-btn {
            width: 100%;
            height: 92px;
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #667085;
            cursor: pointer;
            background: #fafafa;
            text-align: center;
            padding: 8px;
        }

        .file-input {
            display: none;
        }

        .preview-img {
            width: 100%;
            height: 92px;
            border-radius: 12px;
            object-fit: cover;
            display: block;
            border: 1px solid #e5e7eb;
            background: #fff;
        }

        .preview-label {
            margin-top: 6px;
            font-size: 11px;
            color: #667085;
            text-align: center;
        }

        .history-line {
            font-size: 13px;
            color: #444;
            margin-top: 2px;
        }

        .empty-card {
            text-align: center;
            padding: 28px 16px;
            color: #667085;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #f5f5f5;
            font-size: 14px;
        }

        .detail-row span:last-child {
            text-align: right;
        }

        .proof-img {
            width: 100%;
            border-radius: 12px;
            margin-top: 10px;
            border: 1px solid #ddd;
            background: #fff;
        }

        #detail-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.82);
            z-index: 2000;
            display: none;
            overflow-y: auto;
            padding: 20px;
        }

        .modal-content {
            background: white;
            border-radius: 18px;
            padding: 20px;
            max-width: 500px;
            margin: 12px auto;
            position: relative;
        }

        .modal-close {
            float: right;
            cursor: pointer;
            font-size: 24px;
            color: #344054;
        }

        @media (max-width: 540px) {
            .time-box,
            .card-header,
            .detail-row {
                flex-direction: column;
                align-items: flex-start;
            }

            .time-val,
            .detail-row span:last-child {
                text-align: left;
            }

            .stat-grid {
                grid-template-columns: 1fr;
            }

            .upload-card {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo" onclick="showSection('orders')">AULALA</div>
        <div class="nav-btns">
            <span id="guest-nav">
                <a href="javascript:void(0)" onclick="showSection('auth')">登录/注册</a>
            </span>
            <span id="user-nav" class="hidden">
                <a href="javascript:void(0)" onclick="showSection('profile')">个人中心</a>
                <a href="javascript:void(0)" onclick="logout()">退出</a>
            </span>
        </div>
    </header>

    <section id="filter-bar" class="filter-section">
        <div class="filter-inner">
            <input type="date" id="date-filter" class="filter-item" onchange="applyFilters()">
            <select id="state-filter" class="filter-item" onchange="applyFilters()">
                <option value="">州</option>
                <option value="NSW">NSW</option>
                <option value="VIC">VIC</option>
                <option value="QLD">QLD</option>
            </select>
            <input type="text" id="suburb-input" class="filter-item" placeholder="搜索区域 / 入仓号..." oninput="applyFilters()">
        </div>
    </section>

    <div class="container">
        <section id="order-section">
            <div class="section-title">抢单大厅</div>
            <div id="order-list"></div>
        </section>

        <section id="auth-section" class="hidden">
            <div class="card">
                <div style="display:flex; gap:10px; margin-bottom:20px;">
                    <div id="tab-login" style="flex:1; text-align:center; padding:10px; cursor:pointer; border-bottom:2px solid var(--primary);" onclick="switchAuthMode('login')">登录</div>
                    <div id="tab-reg" style="flex:1; text-align:center; padding:10px; cursor:pointer; color:#999;" onclick="switchAuthMode('reg')">注册账号</div>
                </div>

                <div id="reg-role-select" class="hidden" style="margin-bottom:15px; text-align:center;">
                    <label><input type="radio" name="role" value="driver" checked onclick="toggleRegForm('driver')"> 我是司机</label>
                    &nbsp;&nbsp;
                    <label><input type="radio" name="role" value="owner" onclick="toggleRegForm('owner')"> 我是货主</label>
                </div>

                <input type="tel" id="auth-phone" class="auth-field" placeholder="手机号 (测试: 13888888888)">

                <div id="driver-fields" class="hidden">
                    <input type="text" class="auth-field" placeholder="姓名">
                    <input type="text" class="auth-field" placeholder="车牌号">
                    <select class="auth-field">
                        <option>Van (面包车)</option>
                        <option>Truck (大货车)</option>
                    </select>
                </div>

                <div id="owner-fields" class="hidden">
                    <input type="text" class="auth-field" placeholder="公司名/个人名">
                    <input type="email" class="auth-field" placeholder="邮箱">
                    <input type="text" class="auth-field" placeholder="澳洲联系地址">
                    <div style="font-size:12px; color:var(--primary); margin-bottom:5px;">上传证明(多附件)</div>
                    <div style="border:1px dashed #ccc; padding:15px; text-align:center; background:#fafafa; font-size:12px; cursor:pointer;">点击添加附件 (营业执照等)</div>
                </div>

                <input type="password" id="auth-pass" class="auth-field" placeholder="密码 (测试: 123456)">
                <button class="btn-main" onclick="handleAuth()">提交并进入</button>
            </div>
        </section>

        <section id="user-profile" class="hidden">
            <div class="stat-grid">
                <div class="stat-card">
                    <span class="stat-val" id="total-income">$0.00</span>
                    <span class="stat-label">总收入金额</span>
                </div>
                <div class="stat-card">
                    <span class="stat-val" id="completed-count">0</span>
                    <span class="stat-label">完成订单总数</span>
                </div>
            </div>

            <div class="section-title" id="ongoing-title">进行中的订单 (0)</div>
            <div id="ongoing-list"></div>

            <div class="section-title">已完成订单</div>
            <div id="history-list"></div>

            <button class="btn-main" style="background:#667085; margin-top:20px;" onclick="showSection('orders')">返回抢单厅</button>
        </section>
    </div>

    <div id="detail-modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeDetail()">×</span>
            <div id="detail-content"></div>
        </div>
    </div>

    <script src="./orders-data.js"></script>
    <script>
        const fallbackOrders = [
            { id: 101, price: 95, state: "NSW", pickup: "Regents Park", dropoff: "Sydney CBD", pallets: 4, weight: "850kg", time: "24-03 14:00", date: "2026-03-24", pickupAddress: "Regents Park, NSW", dropoffAddress: "Sydney CBD, NSW" },
            { id: 102, price: 125, state: "VIC", pickup: "Clayton", dropoff: "Melbourne CBD", pallets: 6, weight: "1.2t", time: "24-03 09:30", date: "2026-03-24", pickupAddress: "Clayton, VIC", dropoffAddress: "Melbourne CBD, VIC" },
            { id: 103, price: 65, state: "NSW", pickup: "Hurstville", dropoff: "Burwood", pallets: 2, weight: "200kg", time: "25-03 10:00", date: "2026-03-25", pickupAddress: "Hurstville, NSW", dropoffAddress: "Burwood, NSW" },
            { id: 104, price: 148, state: "QLD", pickup: "Acacia Ridge", dropoff: "Brisbane City", pallets: 8, weight: "1.5t", time: "25-03 15:30", date: "2026-03-25", pickupAddress: "Acacia Ridge, QLD", dropoffAddress: "Brisbane City, QLD" }
        ];

        function normalizeOrder(order, index) {
            const weightLabel = typeof order.weight === "string"
                ? order.weight
                : (Number.isFinite(Number(order.weightKg)) ? `${Number(order.weightKg).toFixed(2).replace(/\.00$/, "")}kg` : "0kg");
            return {
                id: order.id ?? (1000 + index),
                price: Number(order.price ?? 100),
                state: order.state || "NSW",
                pickup: order.pickup || "TLA",
                dropoff: order.dropoff || order.dropoffAddress || "待分配",
                pallets: Number(order.pallets ?? 1),
                weight: weightLabel,
                time: order.time || "--",
                date: order.date || "",
                pickupAddress: order.pickupAddress || order.pickup || "",
                dropoffAddress: order.dropoffAddress || order.dropoff || "",
                orderCode: order.orderCode || order.putCode || "",
                cbm: Number(order.cbm || 0),
                pieces: Number(order.pieces || 0),
                source: order.source || "manual"
            };
        }

        const externalOrders = Array.isArray(window.AULALA_ORDER_FEED?.orders) && window.AULALA_ORDER_FEED.orders.length
            ? window.AULALA_ORDER_FEED.orders
            : fallbackOrders;
        const initialOrders = externalOrders.map((order, index) => normalizeOrder(order, index + 1));

        const state = {
            loggedIn: false,
            availableOrders: initialOrders.map(order => ({ ...order })),
            activeOrder: null,
            completedOrders: [
                {
                    id: 88,
                    price: 150,
                    pickup: "Clayton",
                    dropoff: "Melbourne CBD",
                    state: "VIC",
                    pallets: 6,
                    weight: "1.2 Tons",
                    scheduledPickupTime: "24-03 09:30",
                    actualPickupTime: "24-03 09:42",
                    deliveredAt: "24-03 13:18",
                    pickupAddress: "Clayton, VIC",
                    dropoffAddress: "Melbourne CBD, VIC",
                    pickupPhoto: createMockImage("提货照片", "#f59f00"),
                    deliveryPhoto: createMockImage("送达照片", "#1c7ed6"),
                    signaturePhoto: createMockImage("客户签字", "#495057", true)
                }
            ]
        };

        function createMockImage(label, fill, isSignature = false) {
            const svg = isSignature
                ? `<svg xmlns="http://www.w3.org/2000/svg" width="320" height="180" viewBox="0 0 320 180"><rect width="320" height="180" rx="18" fill="#f8fafc"/><rect x="22" y="24" width="276" height="132" rx="14" fill="#ffffff" stroke="#d0d5dd"/><path d="M46 110 C72 78, 94 128, 120 94 S170 86, 190 102 S230 130, 272 76" fill="none" stroke="${fill}" stroke-width="6" stroke-linecap="round"/><text x="160" y="42" font-size="20" text-anchor="middle" fill="#667085" font-family="Arial">客户签字</text></svg>`
                : `<svg xmlns="http://www.w3.org/2000/svg" width="320" height="180" viewBox="0 0 320 180"><rect width="320" height="180" rx="18" fill="${fill}"/><rect x="24" y="24" width="272" height="132" rx="14" fill="rgba(255,255,255,0.16)" stroke="rgba(255,255,255,0.42)"/><text x="160" y="82" font-size="28" text-anchor="middle" fill="#ffffff" font-family="Arial" font-weight="700">${label}</text><text x="160" y="116" font-size="16" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Arial">Aulala Demo</text></svg>`;
            return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
        }

        function formatCurrency(value) {
            return `$${Number(value).toFixed(2)}`;
        }

        function nowStamp() {
            const now = new Date();
            const dd = String(now.getDate()).padStart(2, "0");
            const mm = String(now.getMonth() + 1).padStart(2, "0");
            const hh = String(now.getHours()).padStart(2, "0");
            const min = String(now.getMinutes()).padStart(2, "0");
            return `${dd}-${mm} ${hh}:${min}`;
        }

        function statusMeta(status) {
            const map = {
                waiting_pickup: {
                    label: "等待提货",
                    className: "status-waiting",
                    hint: "抢单成功后，订单立即进入等待提货"
                },
                picked_up: {
                    label: "已提货",
                    className: "status-picked",
                    hint: "到现场装车并上传提货照后，订单变成已提货"
                },
                in_transit: {
                    label: "派送途中",
                    className: "status-transit",
                    hint: "卸货完成但未上传送达图片和签字前，都保持派送途中"
                },
                completed: {
                    label: "已完成",
                    className: "status-completed",
                    hint: "送达图片和签字上传完成后，订单直接进入已完成"
                }
            };
            return map[status];
        }

        function flowClass(orderStatus, stepIndex) {
            const order = ["waiting_pickup", "picked_up", "in_transit"];
            const currentIndex = order.indexOf(orderStatus);
            if (stepIndex < currentIndex) {
                return "flow-step done";
            }
            if (stepIndex === currentIndex) {
                return "flow-step active";
            }
            return "flow-step";
        }

        function renderOrders() {
            const list = document.getElementById("order-list");
            const date = document.getElementById("date-filter").value;
            const selectedState = document.getElementById("state-filter").value;
            const searchKeyword = document.getElementById("suburb-input").value.trim().toLowerCase();

            const filtered = state.availableOrders
                .filter(order => !date || order.date === date)
                .filter(order => !selectedState || order.state === selectedState)
                .filter(order => {
                    if (!searchKeyword) {
                        return true;
                    }
                    return [
                        order.orderCode,
                        order.pickup,
                        order.dropoff,
                        order.pickupAddress,
                        order.dropoffAddress
                    ]
                        .filter(Boolean)
                        .join(" ")
                        .toLowerCase()
                        .includes(searchKeyword);
                })
                .sort((a, b) => `${a.date} ${a.time}`.localeCompare(`${b.date} ${b.time}`));

            if (!filtered.length) {
                list.innerHTML = `
                    <div class="card empty-card">
                        <div style="font-size:16px; font-weight:800; color:#344054; margin-bottom:6px;">没有匹配订单</div>
                        <div>换个州、日期、区域关键词或入仓号再试试。</div>
                    </div>
                `;
                return;
            }

            list.innerHTML = filtered.map(order => `
                <div class="card">
                    <div class="card-header">
                        <div>
                            ${order.orderCode ? `<div class="order-code">${order.orderCode}</div>` : ""}
                            <div class="highlight-specs">
                                <span class="spec-tag">${order.pallets} Plt</span>
                                <span class="spec-tag">${order.weight}</span>
                                ${order.cbm ? `<span class="spec-tag">${order.cbm.toFixed(2)} CBM</span>` : ""}
                            </div>
                        </div>
                        <span class="price">${formatCurrency(order.price)}</span>
                    </div>

                    <div class="time-box">
                        <span class="time-label">提货日期时刻:</span>
                        <span class="time-val">${order.time}</span>
                    </div>

                    <div class="addr-box">
                        <div class="addr">
                            <span class="dot" style="background:var(--success)"></span>
                            <b>提:</b> ${order.pickup}
                            <span class="nav-icon">导航</span>
                            <span class="state-label">${order.state}</span>
                        </div>
                        <div class="addr">
                            <span class="dot" style="background:var(--accent)"></span>
                            <b>送:</b> ${order.dropoff}
                            <span class="state-label">${order.state}</span>
                        </div>
                    </div>

                    <button class="btn-main" onclick="tryAccept(${order.id})">立即抢单</button>
                </div>
            `).join("");
        }

        function renderOngoingOrder(order) {
            return `
                <div class="card">
                    <div class="card-header">
                        <div>
                            ${order.orderCode ? `<div class="order-code">${order.orderCode}</div>` : ""}
                            <div class="highlight-specs">
                                <span class="spec-tag">${order.pallets} Plt</span>
                                <span class="spec-tag">${order.weight}</span>
                                ${order.cbm ? `<span class="spec-tag">${Number(order.cbm).toFixed(2)} CBM</span>` : ""}
                            </div>
                        </div>
                        <span class="price">${formatCurrency(order.price)}</span>
                    </div>

                    <div class="flow-bar">
                        <div class="${flowClass(order.status, 0)}"><strong>等待提货</strong><span>抢单后</span></div>
                        <div class="${flowClass(order.status, 1)}"><strong>已提货</strong><span>装车并拍照</span></div>
                        <div class="${flowClass(order.status, 2)}"><strong>派送途中</strong><span>卸货后待回单</span></div>
                    </div>

                    <div class="time-box">
                        <span class="time-label">预约提货时刻:</span>
                        <span class="time-val">${order.scheduledPickupTime}</span>
                    </div>

                    ${renderRouteBox(order)}

                    ${renderActionPanel(order)}
                </div>
            `;
        }

        function renderRouteBox(order) {
            const pickupUrl = `https://maps.google.com/?q=${encodeURIComponent(order.pickupAddress || order.pickup)}`;
            const dropoffUrl = `https://maps.google.com/?q=${encodeURIComponent(order.dropoffAddress || order.dropoff)}`;
            const deliveryUnlocked = Boolean(order.pickupPhoto);

            return `
                <div class="addr-box">
                    <a href="${pickupUrl}" target="_blank" class="addr">
                        <span class="dot" style="background:var(--success)"></span>
                        提: ${order.pickup}
                        <span class="addr-trailing">
                            <span class="nav-icon">导航</span>
                        </span>
                    </a>
                    ${
                        deliveryUnlocked
                            ? `
                                <a href="${dropoffUrl}" target="_blank" class="addr">
                                    <span class="dot" style="background:var(--accent)"></span>
                                    送: ${order.dropoffAddress || order.dropoff}
                                    <span class="addr-trailing">
                                        <span class="copy-btn" onclick="event.preventDefault(); event.stopPropagation(); copyAddress('${escapeForJs(order.dropoffAddress || order.dropoff)}', '送货地址')">复制</span>
                                        <span class="nav-icon">导航</span>
                                    </span>
                                </a>
                            `
                            : `
                                <div class="addr">
                                    <span class="dot" style="background:var(--accent)"></span>
                                    送: ${order.dropoffAddress || order.dropoff}
                                </div>
                                <div class="addr-locked-note">上传提货照片后，才显示送货导航和复制按钮。</div>
                            `
                    }
                </div>
            `;
        }

        function escapeForJs(value) {
            return String(value)
                .replace(/\\/g, "\\\\")
                .replace(/'/g, "\\'")
                .replace(/\n/g, " ");
        }

        function renderActionPanel(order) {
            if (order.status === "waiting_pickup") {
                return `
                    <div class="note-box">司机抢到单后订单先变成 <b>等待提货</b>。上传提货照片后，会自动记录 <b>实际提货时间</b>，并把上传口切换到送达凭证。</div>
                    <div class="upload-title">提货现场照片</div>
                    <div class="upload-area">
                        <div class="upload-card">
                            ${renderUploadBlock(order.pickupPhoto, "pickupPhoto", "上传装车照片")}
                        </div>
                    </div>
                `;
            }

            if (order.status === "picked_up") {
                return `
                    <div class="note-box">提货时间已记录为 <b>${order.actualPickupTime || "待更新"}</b>。现在上传区已经切换为 <b>送达凭证</b>；送达照片和签字未补齐前，后续会显示为 <b>派送途中</b>。</div>
                    <div class="upload-title">送达凭证</div>
                    <div class="upload-area">
                        <div class="upload-card">
                            ${renderUploadBlock(order.deliveryPhoto, "deliveryPhoto", "上传送达照片")}
                        </div>
                        <div class="upload-card">
                            ${renderUploadBlock(order.signaturePhoto, "signaturePhoto", "上传签字照片")}
                        </div>
                    </div>
                `;
            }

            return `
                <div class="note-box">提货时间已记录为 <b>${order.actualPickupTime || "待更新"}</b>。卸货完成但还没补齐送达图片和签字前，这票都保持 <b>派送途中</b>；两项都补齐后会直接进入已完成。</div>
                <div class="upload-title">送达凭证</div>
                <div class="upload-area">
                    <div class="upload-card">
                        ${renderUploadBlock(order.deliveryPhoto, "deliveryPhoto", "上传送达照片")}
                    </div>
                    <div class="upload-card">
                        ${renderUploadBlock(order.signaturePhoto, "signaturePhoto", "上传签字照片")}
                    </div>
                </div>
            `;
        }

        function renderUploadBlock(image, type, label) {
            if (image) {
                const pretty = type === "pickupPhoto" ? "提货照片" : type === "deliveryPhoto" ? "送达照片" : "客户签字";
                return `
                    <input class="file-input" id="upload-${type}" type="file" accept="image/*" capture="environment" onchange="handleProofUpload(event, '${type}')">
                    <img class="preview-img" src="${image}" alt="${pretty}">
                    <div class="preview-label">${pretty}已上传，可重新拍照</div>
                    <button class="btn-light" onclick="openUpload('${type}')">重新上传</button>
                `;
            }

            return `
                <input class="file-input" id="upload-${type}" type="file" accept="image/*" capture="environment" onchange="handleProofUpload(event, '${type}')">
                <div class="upload-btn" onclick="openUpload('${type}')">
                    <div style="font-size:24px; line-height:1;">+</div>
                    <div>${label}</div>
                </div>
            `;
        }

        function renderHistoryCard(order) {
            return `
                <div class="card">
                    <div class="card-header">
                        <div>
                            ${order.orderCode ? `<div class="order-code">${order.orderCode}</div>` : ""}
                            <span style="font-size:14px; color:#667085;">实际提货 ${order.actualPickupTime || "待更新"}</span>
                        </div>
                        <span class="status-chip status-completed">已完成 ${formatCurrency(order.price)}</span>
                    </div>
                    <div class="history-line">路线: ${order.pickup} → ${order.dropoff} (${order.pallets} Pallets)</div>
                    <div class="history-line">送达时间: ${order.deliveredAt || "--"}</div>
                    <button class="btn-outline" onclick="openDetail(${order.id})">查看完整详情/回单照片</button>
                </div>
            `;
        }

        function renderProfile() {
            const ongoingList = document.getElementById("ongoing-list");
            const historyList = document.getElementById("history-list");
            const completedIncome = state.completedOrders.reduce((sum, order) => sum + Number(order.price), 0);

            document.getElementById("completed-count").textContent = String(state.completedOrders.length);
            document.getElementById("total-income").textContent = formatCurrency(completedIncome);
            document.getElementById("ongoing-title").textContent = `进行中的订单 (${state.activeOrder ? 1 : 0})`;

            ongoingList.innerHTML = state.activeOrder
                ? renderOngoingOrder(state.activeOrder)
                : `
                    <div class="card empty-card">
                        <div style="font-size:16px; font-weight:800; color:#344054; margin-bottom:6px;">当前没有进行中的订单</div>
                        <div>回抢单大厅接新单后，司机流程会从“等待提货”开始。</div>
                    </div>
                `;

            historyList.innerHTML = state.completedOrders.length
                ? state.completedOrders.map(renderHistoryCard).join("")
                : `
                    <div class="card empty-card">
                        <div style="font-size:16px; font-weight:800; color:#344054; margin-bottom:6px;">还没有已完成订单</div>
                        <div>上传送达图片并签字后，这里会自动新增记录。</div>
                    </div>
                `;
        }

        function switchAuthMode(mode) {
            const isReg = mode === "reg";
            document.getElementById("tab-login").style.color = isReg ? "#999" : "#002b7f";
            document.getElementById("tab-login").style.borderBottom = isReg ? "none" : "2px solid #002b7f";
            document.getElementById("tab-reg").style.color = isReg ? "#002b7f" : "#999";
            document.getElementById("tab-reg").style.borderBottom = isReg ? "2px solid #002b7f" : "none";
            document.getElementById("reg-role-select").classList.toggle("hidden", !isReg);
            toggleRegForm(isReg ? "driver" : "none");
        }

        function toggleRegForm(role) {
            document.getElementById("driver-fields").classList.toggle("hidden", role !== "driver");
            document.getElementById("owner-fields").classList.toggle("hidden", role !== "owner");
        }

        function showSection(section) {
            document.getElementById("order-section").style.display = section === "orders" ? "block" : "none";
            document.getElementById("filter-bar").style.display = section === "orders" ? "block" : "none";
            document.getElementById("auth-section").classList.toggle("hidden", section !== "auth");
            document.getElementById("user-profile").classList.toggle("hidden", section !== "profile");
            window.scrollTo(0, 0);
        }

        function handleAuth() {
            const phone = document.getElementById("auth-phone").value.trim();
            const pass = document.getElementById("auth-pass").value.trim();
            if (!phone || !pass) {
                alert("请输入手机号和密码。");
                return;
            }

            state.loggedIn = true;
            document.getElementById("guest-nav").classList.add("hidden");
            document.getElementById("user-nav").classList.remove("hidden");
            renderProfile();
            showSection("profile");
        }

        function logout() {
            location.reload();
        }

        function tryAccept(orderId) {
            if (!state.loggedIn) {
                alert("请先以司机身份登录，再去抢单。");
                showSection("auth");
                return;
            }

            if (state.activeOrder) {
                alert("当前已有进行中的订单，请先完成后再抢下一单。");
                showSection("profile");
                return;
            }

            const order = state.availableOrders.find(item => item.id === orderId);
            if (!order) {
                return;
            }

            if (!confirm("确认抢单吗？")) {
                return;
            }

            state.availableOrders = state.availableOrders.filter(item => item.id !== orderId);
            state.activeOrder = {
                ...order,
                status: "waiting_pickup",
                scheduledPickupTime: order.time,
                actualPickupTime: "",
                deliveredAt: "",
                pickupPhoto: "",
                deliveryPhoto: "",
                signaturePhoto: ""
            };

            renderOrders();
            renderProfile();
            alert("抢单成功，订单已进入“等待提货”。");
            showSection("profile");
        }

        function openUpload(type) {
            const input = document.getElementById(`upload-${type}`);
            if (input) {
                input.click();
            }
        }

        function handleProofUpload(event, type) {
            if (!state.activeOrder) {
                return;
            }

            const file = event.target.files && event.target.files[0];
            if (!file) {
                return;
            }

            const reader = new FileReader();
            reader.onload = () => {
                state.activeOrder[type] = reader.result;

                if (type === "pickupPhoto") {
                    if (!state.activeOrder.actualPickupTime) {
                        state.activeOrder.actualPickupTime = nowStamp();
                    }
                    state.activeOrder.status = "picked_up";
                    renderProfile();
                    return;
                }

                if (state.activeOrder.deliveryPhoto && state.activeOrder.signaturePhoto) {
                    completeOrder();
                    return;
                }

                state.activeOrder.status = "in_transit";
                renderProfile();
            };
            reader.readAsDataURL(file);
        }

        function completeOrder() {
            if (!state.activeOrder) {
                return;
            }

            if (!state.activeOrder.deliveryPhoto || !state.activeOrder.signaturePhoto) {
                alert("请先上传送达照片和签字图片。");
                return;
            }

            const finished = {
                ...state.activeOrder,
                status: "completed",
                deliveredAt: nowStamp()
            };

            state.completedOrders.unshift(finished);
            state.activeOrder = null;
            renderProfile();
            alert("订单已完成，已进入“已完成订单”。");
        }

        async function copyAddress(text, label) {
            try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    await navigator.clipboard.writeText(text);
                } else {
                    const input = document.createElement("textarea");
                    input.value = text;
                    document.body.appendChild(input);
                    input.select();
                    document.execCommand("copy");
                    document.body.removeChild(input);
                }
                alert(`${label}已复制`);
            } catch (error) {
                alert(`复制失败，请手动复制：${text}`);
            }
        }

        function openDetail(orderId) {
            const order = state.completedOrders.find(item => item.id === orderId);
            if (!order) {
                return;
            }

            document.getElementById("detail-content").innerHTML = `
                <h3 style="color:var(--primary); margin-bottom:15px; border-bottom:2px solid var(--primary); padding-bottom:10px;">历史订单详情</h3>
                ${order.orderCode ? `<div class="detail-row"><span>入仓号</span><span>${order.orderCode}</span></div>` : ""}
                <div class="detail-row"><span>结算运费</span><span style="color:var(--accent); font-weight:800;">${formatCurrency(order.price)}</span></div>
                <div class="detail-row"><span>实际提货时间</span><span>${order.actualPickupTime || "待更新"}</span></div>
                <div class="detail-row"><span>预约提货时刻</span><span>${order.scheduledPickupTime || "--"}</span></div>
                <div class="detail-row"><span>送达完成时间</span><span>${order.deliveredAt || "--"}</span></div>
                <div class="detail-row"><span>提货地点</span><span>${order.pickupAddress}</span></div>
                <div class="detail-row"><span>送达地点</span><span>${order.dropoffAddress}</span></div>
                <div class="detail-row"><span>货物规格</span><span>${order.pallets} Pallets / ${order.weight}</span></div>
                <div style="margin-top:15px;">
                    <p style="font-size:13px; font-weight:800;">提货照片：</p>
                    <img class="proof-img" src="${order.pickupPhoto}" alt="提货照片">
                    <p style="font-size:13px; font-weight:800; margin-top:12px;">送达照片：</p>
                    <img class="proof-img" src="${order.deliveryPhoto}" alt="送达照片">
                    <p style="font-size:13px; font-weight:800; margin-top:12px;">客户签字：</p>
                    <img class="proof-img" src="${order.signaturePhoto}" alt="客户签字">
                </div>
                <button class="btn-main" onclick="closeDetail()">关闭</button>
            `;

            document.getElementById("detail-modal").style.display = "block";
        }

        function closeDetail() {
            document.getElementById("detail-modal").style.display = "none";
        }

        function applyFilters() {
            renderOrders();
        }

        document.getElementById("detail-modal").addEventListener("click", event => {
            if (event.target.id === "detail-modal") {
                closeDetail();
            }
        });

        window.onload = () => {
            renderOrders();
            renderProfile();
            switchAuthMode("login");
        };
    </script>
</body>
</html>
