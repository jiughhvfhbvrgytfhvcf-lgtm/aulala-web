<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aulala | 抢单大厅</title>
  <meta http-equiv="refresh" content="0; url=app.html">
  <style>
    :root {
      --primary: #002b7f;
      --border: rgba(0, 43, 127, 0.14);
      --card: rgba(255, 255, 255, 0.96);
      --text: #17213a;
      --muted: #667085;
      --bg:
        radial-gradient(circle at top left, rgba(255, 184, 0, 0.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(0, 43, 127, 0.18), transparent 30%),
        linear-gradient(180deg, #fbfcff 0%, #eff4fb 100%);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .shell {
      width: min(420px, 100%);
      padding: 28px 24px;
      border-radius: 24px;
      border: 1px solid var(--border);
      background: var(--card);
      box-shadow: 0 28px 60px rgba(22, 33, 60, 0.12);
      text-align: center;
    }

    h1 {
      color: var(--primary);
      font-size: 28px;
      font-weight: 900;
    }

    p {
      margin-top: 12px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
    }

    .actions {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      min-width: 148px;
      height: 46px;
      padding: 0 18px;
      border-radius: 14px;
      border: 1px solid rgba(0, 43, 127, 0.12);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: 14px;
      font-weight: 800;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, #0f66ed 100%);
      color: #fff;
      border-color: transparent;
    }

    .btn-secondary {
      background: rgba(0, 43, 127, 0.05);
      color: var(--primary);
    }
  </style>
</head>
<body>
  <main class="shell">
    <h1>Aulala 抢单大厅</h1>
    <p>正在进入抢单大厅。现在首页默认先看抢单，开始抢单时再登录司机账号。</p>
    <div class="actions">
      <a class="btn btn-primary" href="app.html">进入抢单大厅</a>
      <a class="btn btn-secondary" href="login.html">司机登录 / 注册</a>
    </div>
  </main>
  <script>
    window.location.replace("app.html");
  </script>
</body>
</html>
